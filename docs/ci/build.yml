name: build

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build
        run: mvn -q test package
      - name: Check jar contents
        shell: bash
        run: |
          set -euo pipefail
          jar_file="$(ls bulwark/target/Bulwark-*.jar | head -n 1)"
          jar tf "$jar_file" > /tmp/bulwark-jar.txt
          if grep -E '(^docs/|\.java$|\.md$)' /tmp/bulwark-jar.txt; then
            echo "Unexpected source, docs or internal files in jar"
            exit 1
          fi
