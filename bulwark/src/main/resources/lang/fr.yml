findings:
  gap-no-anticheat:
    title: "Aucun anti-cheat détecté"
    detail: "Bulwark audite la configuration, pas la triche en jeu. Aucun plugin anti-cheat n'a été trouvé."
    fix: "Envisage Grim (gratuit) ou Vulcan si des joueurs peuvent tricher sur ce serveur."
  gap-no-backup:
    title: "Aucun plugin de sauvegarde détecté"
    detail: "Aucun plugin de sauvegarde n'a été trouvé. (Tu peux toujours sauvegarder via des snapshots de l'hôte ou cron - ceci ne vérifie que la présence d'un plugin.)"
    fix: "Envisage un plugin de sauvegarde, ou assure-toi que les sauvegardes tournent d'une autre façon."
  gap-no-logging:
    title: "Aucun enregistreur de modifications détecté"
    detail: "Aucun enregistreur de blocs/inventaires n'a été trouvé, donc tu ne peux ni annuler ni retracer le grief et le vol après coup."
    fix: "Envisage CoreProtect (gratuit) pour une restauration à des fins d'enquête."
  offline-mode-login:
    detail: "online-mode=false sans proxy, mais un plugin de connexion (AuthMe/nLogin/...) est installé pour authentifier les joueurs. Ça atténue le plus gros risque - mais le mode hors-ligne reste plus faible qu'une vraie authentification (un mot de passe ayant fuité est la seule chose qui protège un compte, et un plugin de connexion mal configuré rouvre la brèche)."
    fix: "Utilise online-mode=true si tu n'as pas spécifiquement besoin de joueurs cracked/hors-ligne ; sinon assure-toi que le plugin de connexion impose l'inscription et des mots de passe forts."
    title: "Mode hors-ligne (un plugin de connexion gère l'authentification)"
  accepts-transfers:
    detail: "accepts-transfers=true permet à un autre serveur de transférer ses joueurs connectés vers CE serveur via le paquet de transfert 1.20.5+ (qui transporte un cookie). Ne l'active que si tu fais tourner un réseau basé sur les transferts - sinon tu élargis ce qui peut atteindre ton serveur et la confiance qu'il accorde à un serveur en amont."
    fix: "Mets accepts-transfers=false sauf si tu utilises précisément les transferts inter-serveurs."
    title: "Le serveur accepte les transferts de clients"
  bad-username-validation:
    detail: "perform-username-validation=false laisse des joueurs se connecter avec des pseudos contenant des caractères inhabituels. Ça peut casser les données associées au pseudo et être exploité pour usurper une identité ou injecter du contenu via les pseudos dans les commandes/journaux."
    fix: "Remets perform-username-validation à true."
    title: "Validation des pseudos désactivée"
  bungeecord-mode:
    detail: "settings.bungeecord=true fait que le serveur fait confiance à l'identité du joueur envoyée par le proxy. Si le port du serveur est joignable directement, des attaquants peuvent contourner le proxy et usurper N'IMPORTE QUEL joueur/UUID, y compris des admins."
    fix: " (BungeeGuard est installé, ce qui ajoute un jeton de transfert - garde son secret défini et le port protégé par pare-feu.)"
    title: "Le mode BungeeCord fait confiance au proxy"
  command-blocks-enabled:
    detail: "enable-command-block=true permet aux blocs de commande d'exécuter des commandes de niveau maître de jeu. Très bien pour les cartes redstone/aventure ; une surface d'attaque plus large sur un serveur survie avec beaucoup d'opérateurs ou un accès créatif."
    fix: "Mets enable-command-block=false si ton serveur n'utilise pas de mécanismes à base de blocs de commande."
    title: "Les blocs de commande sont activés"
  command-dangerous-default-permission:
    detail: "Ces labels de commande ne declarent pas de permission Bukkit ou declarent une permission par defaut pour tout le monde : {0}. Ce sont seulement des metadonnees; Bulwark ne dit pas qu'un joueur precis peut les executer."
    fix: "Donne a ces commandes des permissions explicites reservees au staff dans ton plugin de permissions et teste avec un compte non-staff."
    title: "Commandes risquees avec defaults publics"
  command-disclosure-public:
    detail: "Des commandes comme {0} sont declarees publiques ou par defaut pour tout le monde. Elles peuvent reveler le logiciel serveur ou les noms de plugins."
    fix: "Si tu ne veux pas de fingerprinting public, restreins ces permissions ou desactive les commandes publiques plugins/version."
    title: "Metadonnees de commandes publiques visibles"
  command-lifecycle-exposed:
    detail: "Des labels de cycle de vie comme {0} ne declarent pas de permission Bukkit ou declarent une permission par defaut pour tout le monde. Ces labels ne devraient jamais etre atteignables par des joueurs normaux."
    fix: "Reserve les commandes de cycle de vie aux operateurs de confiance et privilegie les operations depuis la console."
    title: "Commandes de cycle de vie avec defaults publics"
  command-namespace-op-reachable:
    detail: "Bulwark a trouve des labels namespaced d'operateur comme {0}. Cela ne signifie pas que les joueurs peuvent les executer; cela signifie que les futures politiques de commandes doivent gerer les namespaces."
    fix: "Assure-toi que les politiques de commandes comparent labels exacts et namespaces, pas seulement des alias comme /op."
    title: "Commandes operateur namespaced visibles"
  command-plugin-manager-risk:
    detail: "Bulwark a trouve des labels de plugin-manager comme {0}. Ces outils sont utiles aux admins, mais s'ils sont exposes ils peuvent unload/reload des plugins et agrandir l'impact d'un incident."
    fix: "Reserve les commandes de plugin-manager aux operateurs de confiance, ou retire le plugin de production si tu l'utilises seulement pour tester."
    title: "Commandes plugin-manager installees"
  command-shadowed-alias:
    detail: "Plusieurs proprietaires exposent le meme label sensible : {0}. Cela peut brouiller le staff et contourner des filtres naifs qui ne regardent qu'un proprietaire."
    fix: "Passe ces doublons en revue et utilise des politiques namespaced exactes si necessaire."
    title: "Labels sensibles dupliques"
  command-surface-unavailable:
    detail: "Bulwark n'a pas pu lire la carte des commandes en direct sur cette plateforme ({0}). Cela ne baisse pas la note, mais les contrôles d'exposition des commandes ont été ignorés ou limités aux métadonnées plugin.yml au lieu d'être considérés comme propres."
    fix: "Regarde la console pour les erreurs de plateforme. Sur un fork hybride ou custom, garde une revue manuelle de l'exposition des commandes."
    title: "Surface de commandes illisible"
  command-tabcomplete-disclosure:
    detail: "Des labels sensibles existent dans la command map ({0}). Si tab-complete est ouvert aux joueurs, ces noms peuvent fuiter meme quand l'execution reste protegee par permissions."
    fix: "Si le secret des commandes compte sur ce serveur, restreins les suggestions tab-complete via ta plateforme ou tes permissions."
    title: "Tab-complete peut reveler des commandes sensibles"
  anti-xray-off-public-survival:
    detail: "Bulwark a pu lire le réglage Anti-Xray de Paper et il est désactivé alors que le profil actif est public-survival. Bulwark ne remplace pas un anti-cheat, mais c'est un contrôle de posture utile pour un serveur survival."
    fix: "Active Paper Anti-Xray si la visibilité des minerais compte sur ce serveur, et teste le mode moteur et l'impact performance avant production."
    title: "Paper Anti-Xray est désactivé pour un profil survival public"
  floodgate-key-readable:
    detail: "{0} peut être lu par d'autres utilisateurs locaux. Les clés Floodgate authentifient le forwarding d'identité Bedrock, donc une clé divulguée augmente l'impact du spoofing de comptes."
    fix: "Restreins la clé pour que seul l'utilisateur du serveur Minecraft puisse la lire, et fais-la tourner si tu suspectes une exposition."
    title: "La clé Floodgate est lisible par d'autres utilisateurs OS"
  floodgate-key-writable:
    detail: "{0} peut être modifié par d'autres utilisateurs locaux. Un utilisateur local ou un processus compromis pourrait remplacer la clé de forwarding."
    fix: "Restreins le propriétaire et les permissions de la clé, puis redémarre les composants proxy/backend qui l'utilisent."
    title: "La clé Floodgate est modifiable par d'autres utilisateurs OS"
  geyser-auth-type-mismatch:
    detail: "Floodgate est installé, mais Geyser remote.auth-type vaut '{0}' au lieu de floodgate. Cela peut forcer le mauvais flux d'authentification Bedrock."
    fix: "Mets remote.auth-type à floodgate si ce backend doit utiliser Floodgate, ou retire Floodgate s'il est inutilisé."
    title: "Le auth-type de Geyser ne correspond pas à Floodgate"
  posture-profile-auto:
    detail: "Bulwark utilise le profil de posture {0} à partir de preuves locales : {1}. Le profil auto est une preuve visible, pas une décision de confiance cachée."
    fix: "Si ce profil est incorrect, définis security-profile explicitement dans config.yml."
    title: "Profil de sécurité déduit automatiquement"
  posture-profile-invalid:
    detail: "security-profile vaut '{0}', ce que Bulwark ne connaît pas. Il est revenu à la détection automatique : {1}."
    fix: "Mets security-profile à auto, public-survival, private-smp, minigame, creative-build, proxy-backend ou modded."
    title: "Profil de sécurité inconnu configuré"
  posture-profile-unconfirmed:
    detail: "security-profile vaut {0}, mais security-profile-confirmed est false. Bulwark l'affichera comme configuré mais non confirmé."
    fix: "Mets security-profile-confirmed=true après avoir vérifié que le profil correspond à ce serveur."
    title: "Le profil de sécurité n'est pas confirmé"
  profile-private-whitelist-open:
    detail: "Ce serveur est traité comme private-smp, mais white-list=false permet à toute personne connaissant l'adresse de rejoindre."
    fix: "Active la whitelist et enforce-whitelist, ou change security-profile si ce serveur est volontairement public."
    title: "Profil private SMP avec whitelist ouverte"
  proxy-backend-firewall-unverified:
    detail: "Bulwark a détecté un profil proxy-backend. Depuis Bukkit il peut lire la configuration de forwarding, mais il ne peut pas prouver que le port backend est protégé d'Internet par pare-feu."
    fix: "Confirme au niveau du pare-feu ou du panel que seul le proxy peut atteindre ce port backend."
    title: "L'exposition du backend proxy ne peut pas être prouvée localement"
  consent-needed:
    detail: "Bulwark n'a encore rien analysé. Il a besoin de ton consentement ponctuel avant de lire la config de ce serveur et les réglages de l'hôte - tout est en lecture seule et rien ne quitte jamais la machine."
    fix: "Lance /bulwark consent pour autoriser l'analyse (tu peux la révoquer à tout moment avec /bulwark consent off)."
    title: "Analyse pas encore autorisée"
  console-all-permissions:
    detail: "console.has-all-permissions=true donne à la console (et à tout plugin qui exécute des commandes en tant que console) toutes les permissions, contournant les contrôles de permission des plugins. Si un plugin route une entrée non fiable vers la console, c'est une voie d'élévation de privilèges."
    fix: "Mets console.has-all-permissions=false pour que la console respecte les permissions des plugins."
    title: "La console a toutes les permissions"
  duplicate-plugins:
    detail: "Plusieurs jars déclarent le même plugin : {1}. Des copies en double ou anciennes provoquent des conflits, le chargement de la mauvaise version et des bugs difficiles à tracer."
    fix: "Garde un seul jar à jour par plugin dans /plugins et supprime les autres."
    title: "Jars de plugin en double ({0})"
  plugin-trust-drift:
    detail: "{0} changement(s) de jars de plugin détecté(s) depuis la référence de confiance : {1}. Un jar modifié, absent ou inattendu peut signaler une mauvaise mise à jour, une ancienne copie restante ou une manipulation."
    fix: "Si c'était volontaire, vérifie la source du téléchargement puis lance /bulwark trust baseline. Sinon, supprime le jar inconnu et restaure celui attendu depuis une sauvegarde propre."
    title: "Jars de plugin modifiés depuis la référence de confiance"
  floodgate-online-mode:
    detail: "Floodgate/Geyser est installé mais online-mode=false. Floodgate authentifie lui-même les joueurs Bedrock et est conçu pour tourner avec online-mode=true - il n'a PAS besoin du mode hors-ligne. Tourner en hors-ligne ici affaiblit la sécurité des comptes Java sans aucun bénéfice côté Bedrock."
    fix: "Mets online-mode=true et laisse Floodgate gérer l'authentification Bedrock (selon la doc GeyserMC)."
    title: "Floodgate/Geyser tourne en mode hors-ligne"
  forge-mod-surface:
    detail: "Ce serveur tourne avec {0}. Les mods tournent avec un accès JVM complet et ne passent pas par le système de permissions de Bukkit, donc la note de Bulwark ne couvre que la couche Bukkit/plugin - pas les mods."
    fix: "Audite tes mods séparément et ne fais tourner que des mods en lesquels tu as confiance."
    title: "Les mods tournent hors de cet audit"
  loader-anticheat-context:
    detail: "Bulwark a détecté {0}. Les recommandations anti-cheat Bukkit génériques peuvent ne pas convenir aux serveurs modded/hybrides, donc ceci est signalé comme contexte du loader."
    fix: "Utilise un anti-cheat ou un stack de modération testé avec ce loader et cette version exacte de Minecraft."
    title: "Aucun anti-cheat compatible loader vérifié"
  loader-runtime-detected:
    detail: "Bulwark a détecté {0}. Les constats conscients du loader réduisent les hypothèses Bukkit/Paper sur les serveurs modded ou hybrides."
    fix: "Utilise /bulwark inventory all pour examiner les vrais jars plugin/mod, et définis security-profile explicitement si ce rôle serveur est inhabituel."
    title: "Runtime loader détecté"
  artifact-mods-without-loader:
    detail: "Bulwark a trouvé {0} jar(s) de mods, mais le runtime n'a pas confirmé Forge, NeoForge, Fabric, Quilt ni un hybride Bukkit/mod. C'est souvent un dossier restant, une copie de server-pack ou un mismatch de loader."
    fix: "Supprime les mods obsolètes, ou vérifie le loader et la version prévus avant de traiter ces mods comme actifs."
    title: "Mods trouvés sans loader confirmé"
  high-function-permission-level:
    detail: "function-permission-level={0} donne aux fonctions de datapack le niveau {0} (3-4 = maître de jeu/propriétaire). Un datapack non fiable ou compromis peut alors exécuter des commandes de niveau admin."
    fix: "Remets function-permission-level à 2 sauf si un datapack de confiance a vraiment besoin de plus."
    title: "Les fonctions tournent avec un niveau de permission élevé ({0})"
  high-op-permission-level:
    detail: "op-permission-level={0} donne à chaque opérateur le niveau le plus élevé, y compris /stop et les commandes de bloc de commande/propriétaire. C'est la valeur par défaut - signalé seulement pour que tu saches que tu peux réduire l'impact d'un opérateur compromis."
    fix: "Si tes opérateurs n'ont pas besoin des commandes de niveau propriétaire, mets op-permission-level à 3."
    title: "Les opérateurs ont le niveau de permission maximum ({0})"
  high-simulation-distance:
    detail: "Une simulation-distance élevée augmente la charge de tick par joueur."
    fix: "Abaisse simulation-distance à {1} ou moins."
    title: "simulation-distance élevée ({0})"
  high-view-distance:
    detail: "Une view-distance élevée multiplie le CPU et la bande passante par joueur et élargit la surface de lag/DoS."
    fix: "Abaisse view-distance à {1} ou moins (6-10 est typique)."
    title: "view-distance élevée ({0})"
  host-readable-ops:
    detail: "ops.json - la liste des comptes opérateurs et de leurs UUID - peut être lu par n'importe quel autre utilisateur de cette machine, offrant à un attaquant une liste toute prête des comptes les plus précieux à cibler.{0}"
    fix: "Restreins-le pour que seul l'utilisateur du serveur puisse le lire (par ex. chmod 600 ops.json)."
    title: "ops.json est lisible par tout le monde"
  host-readable-secret:
    detail: "server.properties peut être lu par n'importe quel autre compte utilisateur de cette machine, et il contient ton mot de passe RCON en clair - donc tout utilisateur local (ou un plugin compromis tournant sous un autre utilisateur) peut le lire.{0}"
    fix: "Restreins-le pour que seul l'utilisateur du serveur puisse le lire (par ex. chmod 600 server.properties)."
    title: "server.properties est lisible par tout le monde et contient un mot de passe RCON"
  host-writable-plugins:
    detail: "Le dossier plugins ou ses jars peuvent être écrits par d'autres utilisateurs OS, donc quiconque a un shell sur cet hôte pourrait remplacer un plugin par un plugin piégé - une attaque locale de la chaîne d'approvisionnement.{0}"
    fix: "Resserre la propriété/les permissions pour que seul l'utilisateur du serveur puisse écrire dans plugins/ (par ex. chown vers l'utilisateur du serveur et chmod 750)."
    title: "Les jars de plugin sont modifiables par tout le monde"
  host-writable-root:
    detail: "Le répertoire de travail du serveur peut être écrit par d'autres utilisateurs OS, donc quiconque a un shell sur cet hôte pourrait déposer ou remplacer des fichiers que le serveur charge - configs, jars, scripts de démarrage - une attaque locale de la chaîne d'approvisionnement.{0}"
    fix: "Resserre-le pour que seul l'utilisateur du serveur puisse écrire : chown le répertoire vers l'utilisateur du serveur et chmod-le en 750."
    title: "Le répertoire du serveur est modifiable par tout le monde"
  insecure-chat:
    detail: "enforce-secure-profile=false laisse les clients discuter sans messages signés cryptographiquement (1.19+). Ça affaiblit la traçabilité des messages et le système de signalement du chat, et laisse se connecter des clients non standard incapables de signer le chat."
    fix: "Mets enforce-secure-profile=true sauf si tu as précisément besoin de prendre en charge des clients incapables de signer le chat."
    title: "Chat signé non imposé"
  jmx-enabled:
    detail: "enable-jmx-monitoring=true ouvre une interface de gestion JMX. Si son port est joignable - surtout sans authentification JMX ni TLS - c'est une surface de gestion à distance qui peut fuiter des éléments internes ou, dans certaines configs, être transformée en exécution de code à distance."
    fix: "Mets enable-jmx-monitoring=false sauf si tu utilises activement JMX ; si oui, lie-le à localhost avec authentification et TLS."
    title: "La supervision JMX est activée"
  jvm-heap:
    detail: "Le tas max de la JVM (-Xmx ~{0} Mo) représente {1}% de la RAM de la machine (~{2} Mo). Ça ne laisse presque rien pour l'OS, la mémoire hors-tas et les autres processus, donc le serveur risque de se faire tuer par l'OOM ou de ramer à cause du swap."
    fix: "Garde une marge : règle -Xmx à environ 70-80% de la RAM (et Xms égal à Xmx), en tenant compte de tout ce qui tourne d'autre sur la machine."
    title: "Le tas de la JVM occupe presque toute la RAM système"
  log4shell:
    detail: "Minecraft {0} détecté, de la période affectée par CVE-2021-44228 (Log4Shell). Que tu sois réellement exposé dépend de ton build : les jars Paper/Spigot datés du 2021-12-10 ou plus récents embarquent un Log4j corrigé (2.15+) et sont sûrs."
    fix: "Assure-toi que ton jar serveur est un build daté du 2021-12-10 ou plus récent (ou mets à jour vers 1.18.1+), ou démarre avec -Dlog4j2.formatMsgNoLookups=true."
    title: "Version de Minecraft de l'époque Log4Shell"
  many-operators:
    detail: "Il y a {0} ops. Chaque op a un contrôle complet et non vérifié du serveur et de la console ; si l'un de ces comptes est compromis, la surface d'attaque est large."
    fix: "Garde le statut op pour les rares personnes qui ont vraiment besoin d'un contrôle total ; donne aux autres des permissions ciblées avec un plugin de permissions (LuckPerms)."
    title: "Beaucoup d'opérateurs serveur ({0})"
  no-proxy-protection:
    detail: "prevent-proxy-connections=false (la valeur par défaut) laisse désactivée la vérification de proxy de Mojang, donc les connexions passant par des proxys connus ne sont pas rejetées. Ce n'est que le réglage vanilla - un plugin AntiVPN dédié fait bien mieux le travail."
    fix: "Mets prevent-proxy-connections=true pour une vérification vanilla légère, ou fais tourner un plugin AntiVPN si le contournement de ban ou les bots posent problème."
    title: "Connexions VPN/proxy non bloquées (réglage vanilla)"
  no-rate-limit:
    detail: "rate-limit=0 est la valeur par défaut d'origine et laisse désactivée la limite de paquets par connexion, donc un client de flood/crash n'est pas coupé par le serveur lui-même. Paper a ses propres protections de paquets, donc considère ça comme un durcissement optionnel, pas un trou béant."
    fix: "Tu peux régler rate-limit sur une valeur comme 300 pour que les clients abusifs soient coupés - vérifie que ça n'affecte pas les joueurs normaux."
    title: "Aucune limite de débit de paquets (par défaut)"
  no-server-properties:
    detail: "Bulwark n'a pas trouvé server.properties à côté du jar serveur, donc quelques contrôles ont été ignorés. C'est normal sur un proxy."
    fix: "Lance Bulwark sur le serveur de jeu lui-même, ou vérifie les permissions des fichiers."
    title: "server.properties introuvable"
  no-spawn-protection:
    detail: "spawn-protection=0 laisse les non-opérateurs construire et casser au spawn. C'est parfaitement bien si tu protèges le spawn avec un plugin de régions (WorldGuard etc.) - signalé juste pour information."
    fix: "Mets un petit rayon (par ex. 16), ou ignore ça si un plugin de régions protège déjà le spawn."
    title: "Aucune protection de spawn vanilla"
  no-whitelist:
    detail: "white-list=false signifie que quiconque connaît l'adresse peut se connecter. Très bien pour un serveur public, risqué pour un serveur privé ou de préproduction."
    fix: "Mets white-list=true (et enforce-whitelist=true) si ce serveur est censé être privé."
    title: "La whitelist est désactivée"
  offline-mode:
    detail: "online-mode=false sans proxy détecté et sans plugin de connexion trouvé. N'importe qui peut se connecter sous N'IMPORTE QUEL pseudo - y compris tes admins - sans aucune authentification. C'est le plus gros trou de sécurité de comptes qui existe."
    fix: "Mets online-mode=true dans server.properties et redémarre. N'utilise le mode hors-ligne que derrière un proxy correctement protégé par pare-feu, ou avec un plugin de connexion (AuthMe) qui impose des mots de passe."
    title: "Le serveur est en mode hors-ligne"
  offline-mode-proxy:
    detail: "online-mode est à false, ce qui est attendu quand un proxy (BungeeCord/Velocity) gère la connexion."
    fix: "Assure-toi que le port du serveur est protégé par pare-feu pour que seul le proxy puisse l'atteindre et que le transfert moderne (Velocity) ou BungeeGuard est activé - sinon n'importe qui peut se connecter directement sous n'importe quel joueur."
    title: "Mode hors-ligne (proxy détecté)"
  old-java:
    detail: "Tu es sur Java {1}. Les anciennes versions de Java manquent des correctifs de sécurité et du travail de performance ; Minecraft moderne (1.18+) demande Java 17+."
    fix: "Mets à jour vers un Java LTS actuel (17 ou 21) adapté à ta version de Minecraft."
    title: "Java obsolète ({0})"
  process-as-root:
    detail: "Le serveur Minecraft tourne sous l'utilisateur root. N'importe quel plugin - ou un bug d'exécution de code à distance dans l'un d'eux - contrôle alors toute la machine, pas seulement le serveur. C'est le pire impact possible en cas de compromission.{0}"
    fix: "Fais tourner le serveur sous un utilisateur dédié non-root : crée-en un, chown les fichiers du serveur vers lui, et démarre le service sous cet utilisateur."
    title: "Le processus du serveur tourne en tant que root"
  query-enabled:
    detail: "enable-query=true expose des infos serveur en direct (joueurs, version) à tout le monde, ce que les attaquants utilisent pour identifier et cibler les serveurs."
    fix: "Mets enable-query=false sauf si un outil que tu utilises en a vraiment besoin."
    title: "Protocole query activé"
  query-plugins:
    detail: "bukkit.yml settings.query-plugins=true fait que le protocole query (activé) distribue ta liste exacte de plugins et leurs versions, ce que les attaquants utilisent pour repérer sur ton serveur des plugins vulnérables connus."
    fix: "Mets query-plugins=false dans bukkit.yml, ou désactive complètement le protocole query avec enable-query=false dans server.properties."
    title: "Query expose la liste complète des plugins"
  rcon-enabled:
    detail: "La console distante est activée. Même avec un mot de passe fort, un port RCON exposé est un risque de contrôle à distance."
    fix: "Protège le port RCON par pare-feu pour que toi seul puisses l'atteindre, ou désactive-le quand il n'est pas utilisé."
    title: "RCON est activé"
  rcon-no-password:
    detail: "La console distante (RCON) est activée avec un mot de passe vide - c'est le contrôle à distance complet de ton serveur pour quiconque peut atteindre le port RCON."
    fix: "Définis un rcon.password long et aléatoire, ou désactive RCON (enable-rcon=false) si tu ne l'utilises pas. N'expose jamais le port RCON à Internet."
    title: "RCON activé sans mot de passe"
  rcon-weak-password:
    detail: "RCON est activé avec un mot de passe court ({0} caractères), qui peut être cassé par force brute."
    fix: "Utilise un mot de passe aléatoire de 16 caractères ou plus et limite le port RCON à localhost/admin uniquement par pare-feu."
    title: "Le mot de passe RCON est faible"
  resource-pack-no-sha:
    detail: "Une URL de resource-pack est définie mais resource-pack-sha1 est vide, donc les clients ne peuvent pas vérifier le pack - un attaquant en position d'intermédiaire pourrait le remplacer par une version altérée, et les clients le re-téléchargent à chaque connexion."
    fix: "Mets resource-pack-sha1 au SHA-1 du fichier de pack exact que tu sers."
    title: "Resource pack servi sans SHA-1"
  unsupported-exploit:
    detail: "unsupported-settings.{0} de Paper est à true, ce qui réactive intentionnellement un exploit ou un dupe connu."
    fix: "Remets {0} à false sauf si tu en comprends pleinement la conséquence."
    title: "Réglage 'unsupported' dangereux activé"
  velocity-no-secret:
    detail: "Le transfert moderne de Velocity est activé mais le secret est vide, donc le backend ne peut pas vérifier le proxy - les joueurs peuvent être usurpés."
    fix: "Définis le même secret de transfert dans le proxy et dans le secret Velocity du serveur."
    title: "Transfert Velocity sans secret"
  watchdog-max-tick:
    detail: "max-tick-time={0} désactive le watchdog de tick unique, donc un tick bloqué ou en interblocage ne déclenchera pas la protection crash/redémarrage - le serveur peut geler indéfiniment au lieu de récupérer."
    fix: "Laisse max-tick-time à sa valeur par défaut (60000) sauf raison précise, pour qu'un serveur gelé soit détecté et redémarré."
    title: "Watchdog du serveur désactivé (max-tick-time)"
  watchdog-off:
    detail: "Le timeout-time de spigot.yml est nul ou négatif, donc le watchdog ne redémarrera pas un serveur gelé."
    fix: "Laisse timeout-time à une valeur raisonnable (par ex. 60) pour qu'un serveur bloqué récupère tout seul."
    title: "Watchdog du serveur effectivement désactivé"
  whitelist-not-enforced:
    detail: "La whitelist est activée mais enforce-whitelist=false, donc un joueur retiré de la liste pendant qu'il est connecté n'est pas expulsé."
    fix: "Mets enforce-whitelist=true pour que les changements de whitelist s'appliquent immédiatement."
    title: "Whitelist non imposée en direct"
