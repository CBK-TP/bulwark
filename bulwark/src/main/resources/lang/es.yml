findings:
  gap-no-anticheat:
    title: "No se detecta ningún anti-cheat"
    detail: "Bulwark audita la configuración, no las trampas de juego. No se encontró ningún plugin anti-cheat."
    fix: "Considera Grim (gratis) o Vulcan si los jugadores pueden hacer trampas en este servidor."
  gap-no-backup:
    title: "No se detecta ningún plugin de copias de seguridad"
    detail: "No se encontró ningún plugin de copias de seguridad. (Puedes seguir haciendo copias con snapshots del host o cron; esto solo comprueba si hay un plugin.)"
    fix: "Considera un plugin de copias de seguridad, o asegúrate de que las copias se hacen de otra forma."
  gap-no-logging:
    title: "No se detecta ningún registro de cambios"
    detail: "No se encontró ningún registro de bloques/inventarios, así que no puedes revertir ni rastrear grief y robos a posteriori."
    fix: "Considera CoreProtect (gratis) para revertir con fines forenses."
  accepts-transfers:
    detail: "accepts-transfers=true permite que otro servidor traspase a ESTE los jugadores conectados mediante el paquete de transferencia de 1.20.5+ (que lleva una cookie). Actívalo solo si gestionas una red basada en transferencias; de lo contrario amplías lo que puede llegar a tu servidor y cuánto confía en un servidor de origen."
    fix: "Pon accepts-transfers=false salvo que uses transferencias entre servidores expresamente."
    title: "El servidor acepta transferencias de clientes"
  bad-username-validation:
    detail: "perform-username-validation=false permite que entren jugadores con nombres que contienen caracteres inusuales. Eso puede romper los datos asociados a cada nombre y prestarse a suplantar identidades o inyectar a través de los nombres en comandos y registros."
    fix: "Vuelve a poner perform-username-validation en true."
    title: "Validación de nombres de usuario desactivada"
  bungeecord-mode:
    detail: "settings.bungeecord=true hace que el servidor confíe en la identidad del jugador que le envía el proxy. Si el puerto del servidor es accesible directamente, un atacante puede saltarse el proxy y suplantar a CUALQUIER jugador/UUID, incluidos los administradores."
    fix: " (BungeeGuard está instalado, lo que añade un token de reenvío; mantén su secreto definido y el puerto cerrado por el firewall.)"
    title: "El modo BungeeCord confía en el proxy"
  command-blocks-enabled:
    detail: "enable-command-block=true permite que los bloques de comandos ejecuten comandos a nivel de gamemaster. Está bien para mapas de redstone o de aventura; en un servidor de supervivencia con muchos operadores o acceso a creativo amplía la superficie de ataque."
    fix: "Pon enable-command-block=false si tu servidor no usa mecanismos con bloques de comandos."
    title: "Los bloques de comandos están habilitados"
  command-dangerous-default-permission:
    detail: "Estas etiquetas de comando no declaran permiso Bukkit o declaran un permiso por defecto para todos: {0}. Es solo metadato; Bulwark no afirma que un jugador concreto pueda ejecutarlas."
    fix: "Da a estos comandos permisos explicitos solo para staff en tu plugin de permisos y prueba con una cuenta no staff."
    title: "Comandos de riesgo con defaults publicos"
  command-disclosure-public:
    detail: "Comandos como {0} estan declarados como publicos o por defecto para todos. Pueden revelar software del servidor o nombres de plugins a quien pueda ejecutarlos."
    fix: "Si no quieres fingerprinting publico, restringe estos permisos o desactiva comandos publicos de plugins/version."
    title: "Metadatos de comandos publicos visibles"
  command-lifecycle-exposed:
    detail: "Etiquetas de ciclo de vida como {0} no declaran permiso Bukkit o declaran default para todos. Estas etiquetas no deberian ser alcanzables por jugadores normales."
    fix: "Restringe comandos de ciclo de vida a operadores de confianza y prefiere flujos operativos solo por consola."
    title: "Comandos de ciclo de vida con defaults publicos"
  command-namespace-op-reachable:
    detail: "Bulwark encontro etiquetas namespaced de operador como {0}. Esto no significa que los jugadores puedan ejecutarlas; significa que futuras politicas de comandos deben contemplar namespaces."
    fix: "Asegurate de que las politicas de comandos comparen etiquetas exactas y namespaces, no solo alias como /op."
    title: "Comandos de operador con namespace visibles"
  command-plugin-manager-risk:
    detail: "Bulwark encontro etiquetas de plugin-manager como {0}. Estas herramientas son utiles para admins, pero si quedan expuestas pueden descargar/recargar plugins y agrandar el impacto de un incidente."
    fix: "Restringe comandos de plugin-manager a operadores de confianza, o elimina el plugin en produccion si solo lo usas para pruebas."
    title: "Comandos de plugin-manager instalados"
  command-shadowed-alias:
    detail: "Varios propietarios exponen la misma etiqueta sensible: {0}. Puede confundir al staff y saltarse filtros ingenuos que solo revisan un propietario."
    fix: "Revisa estos duplicados y usa politicas namespaced exactas donde haga falta."
    title: "Etiquetas sensibles duplicadas"
  command-surface-unavailable:
    detail: "Bulwark no pudo leer el mapa de comandos en vivo en esta plataforma ({0}). Esto no baja la nota, pero significa que los checks de exposición de comandos se omitieron o quedaron limitados a metadatos de plugin.yml en vez de tratarse como limpios."
    fix: "Revisa la consola para errores de plataforma. Si es un fork hibrido o custom, revisa la exposicion de comandos manualmente."
    title: "No se pudo leer la superficie de comandos"
  command-tabcomplete-disclosure:
    detail: "Existen etiquetas sensibles en el command map ({0}). Si tab-complete esta abierto a jugadores, esos nombres pueden filtrarse aunque la ejecucion siga protegida por permisos."
    fix: "Si ocultar comandos importa en este servidor, restringe sugerencias de tab-complete con tu plataforma o permisos."
    title: "Tab-complete puede revelar comandos sensibles"
  anti-xray-off-public-survival:
    detail: "Bulwark pudo leer la configuración Anti-Xray de Paper y está desactivada mientras el perfil activo es public-survival. Bulwark no sustituye a un anti-cheat, pero es un control útil de postura en survival."
    fix: "Activa Paper Anti-Xray si la visibilidad de minerales importa en este servidor, y prueba el modo de motor y el impacto en rendimiento antes de producción."
    title: "Paper Anti-Xray está desactivado para un perfil survival público"
  floodgate-key-readable:
    detail: "{0} puede ser leído por otros usuarios locales. Las claves de Floodgate autentican el forwarding de identidad Bedrock, así que una clave filtrada amplía el impacto de spoofing de cuentas."
    fix: "Restringe la clave para que solo el usuario del servidor Minecraft pueda leerla, y rótala si sospechas que se expuso."
    title: "La clave de Floodgate es legible por otros usuarios del SO"
  floodgate-key-writable:
    detail: "{0} puede ser modificado por otros usuarios locales. Un usuario local o proceso comprometido podría reemplazar la clave de forwarding."
    fix: "Restringe propietario y permisos de la clave, y reinicia los componentes proxy/backend que la usan."
    title: "La clave de Floodgate es escribible por otros usuarios del SO"
  geyser-auth-type-mismatch:
    detail: "Floodgate está instalado, pero Geyser remote.auth-type es '{0}' en vez de floodgate. Eso puede forzar el flujo de autenticación Bedrock incorrecto."
    fix: "Pon remote.auth-type en floodgate si este backend debe usar Floodgate, o elimina Floodgate si no se usa."
    title: "El auth-type de Geyser no coincide con Floodgate"
  posture-profile-auto:
    detail: "Bulwark está usando el perfil de postura {0} a partir de evidencia local: {1}. El perfil auto es evidencia visible, no una decisión de confianza oculta."
    fix: "Si este perfil no es correcto, fija security-profile explícitamente en config.yml."
    title: "Perfil de seguridad inferido automáticamente"
  posture-profile-invalid:
    detail: "security-profile está configurado como '{0}', que Bulwark no conoce. Se usó detección automática: {1}."
    fix: "Pon security-profile en auto, public-survival, private-smp, minigame, creative-build, proxy-backend o modded."
    title: "Perfil de seguridad desconocido configurado"
  posture-profile-unconfirmed:
    detail: "security-profile está en {0}, pero security-profile-confirmed es false. Bulwark lo mostrará como configurado pero no confirmado."
    fix: "Pon security-profile-confirmed=true después de comprobar que el perfil encaja con este servidor."
    title: "El perfil de seguridad no está confirmado"
  profile-private-whitelist-open:
    detail: "Este servidor se está tratando como private-smp, pero white-list=false permite entrar a cualquiera que conozca la dirección."
    fix: "Activa whitelist y enforce-whitelist, o cambia security-profile si el servidor es público intencionadamente."
    title: "Perfil private SMP con whitelist abierta"
  proxy-backend-firewall-unverified:
    detail: "Bulwark detectó un perfil proxy-backend. Desde Bukkit puede leer la configuración de forwarding, pero no puede probar que el puerto backend esté protegido de Internet por firewall."
    fix: "Confirma en el firewall o panel que solo el proxy puede alcanzar este puerto backend."
    title: "La exposición del backend proxy no se puede probar localmente"
  consent-needed:
    detail: "Bulwark aún no ha escaneado nada. Necesita tu consentimiento, una sola vez, antes de leer la configuración de este servidor y los ajustes del host; todo es de solo lectura y nada sale nunca de la máquina."
    fix: "Ejecuta /bulwark consent para autorizar el escaneo (puedes revocarlo cuando quieras con /bulwark consent off)."
    title: "El escaneo aún no está autorizado"
  console-all-permissions:
    detail: "console.has-all-permissions=true da a la consola (y a cualquier plugin que ejecute comandos como la consola) todos los permisos, saltándose las comprobaciones de permisos de los plugins. Si un plugin lleva entrada no confiable a la consola, ahí tienes una vía de escalada de privilegios."
    fix: "Pon console.has-all-permissions=false para que la consola respete los permisos de los plugins."
    title: "La consola tiene todos los permisos"
  duplicate-plugins:
    detail: "Más de un jar declara el mismo plugin: {1}. Las copias duplicadas o antiguas provocan conflictos, que cargue la versión equivocada y errores difíciles de rastrear."
    fix: "Mantén un único jar actualizado por plugin en /plugins y borra los demás."
    title: "Jars de plugin duplicados ({0})"
  plugin-trust-drift:
    detail: "Se detectaron {0} cambio(s) de jars de plugin desde la línea base de confianza: {1}. Un jar cambiado, ausente o inesperado puede ser una mala actualización, una copia sobrante o una manipulación."
    fix: "Si fue intencionado, verifica la fuente de descarga y ejecuta /bulwark trust baseline. Si no, elimina el jar desconocido y restaura el esperado desde una copia limpia."
    title: "Jars de plugins cambiados desde la línea base de confianza"
  floodgate-online-mode:
    detail: "Floodgate/Geyser está instalado pero online-mode=false. Floodgate autentica por su cuenta a los jugadores de Bedrock y está pensado para funcionar con online-mode=true; NO necesita el modo offline. Funcionar en offline aquí debilita la seguridad de las cuentas de Java sin ningún beneficio para Bedrock."
    fix: "Pon online-mode=true y deja que Floodgate se encargue de la autenticación de Bedrock (según la documentación de GeyserMC)."
    title: "Floodgate/Geyser funcionando con el modo offline"
  forge-mod-surface:
    detail: "Este servidor ejecuta {0}. Los mods se ejecutan con acceso total a la JVM y no pasan por el sistema de permisos de Bukkit, así que la nota de Bulwark solo cubre la capa de Bukkit/plugins, no los mods."
    fix: "Audita tus mods aparte y ejecuta solo mods de confianza."
    title: "Los mods quedan fuera de esta auditoría"
  loader-anticheat-context:
    detail: "Bulwark detectó {0}. Las recomendaciones genéricas de anti-cheat Bukkit pueden no encajar en servidores modded/híbridos, así que se informa como contexto del loader."
    fix: "Usa un anti-cheat o stack de moderación probado con este loader y versión exactos de Minecraft."
    title: "No se verificó anti-cheat compatible con el loader"
  loader-runtime-detected:
    detail: "Bulwark detectó {0}. Los hallazgos conscientes del loader reducen suposiciones Bukkit/Paper en servidores modded o híbridos."
    fix: "Usa /bulwark inventory all para revisar los jars reales de plugins/mods, y fija security-profile explícitamente si este servidor tiene un rol inusual."
    title: "Runtime loader detectado"
  artifact-mods-without-loader:
    detail: "Bulwark encontró {0} jar(s) de mods, pero el runtime no confirmó Forge, NeoForge, Fabric, Quilt ni un híbrido Bukkit/mod. Suele ser una carpeta antigua, una copia de server-pack o un desajuste de loader."
    fix: "Elimina mods obsoletos, o verifica el loader y versión previstos antes de tratar esos mods como activos."
    title: "Mods encontrados sin loader confirmado"
  high-function-permission-level:
    detail: "function-permission-level={0} da a las funciones de datapack el nivel {0} (3-4 = gamemaster/propietario). Entonces un datapack no confiable o comprometido puede ejecutar comandos de nivel administrador."
    fix: "Vuelve a poner function-permission-level en 2 salvo que un datapack de confianza necesite realmente más."
    title: "Las funciones se ejecutan con un nivel de permiso elevado ({0})"
  high-op-permission-level:
    detail: "op-permission-level={0} da a todos los operadores el nivel más alto, incluidos /stop y los comandos de bloque de comandos/propietario. Es el valor por defecto; se señala solo para que sepas que puedes reducir el alcance del daño de un operador comprometido."
    fix: "Si tus operadores no necesitan comandos de nivel propietario, pon op-permission-level en 3."
    title: "Los operadores tienen el nivel de permiso máximo ({0})"
  high-simulation-distance:
    detail: "Un simulation-distance alto aumenta la carga de ticks por jugador."
    fix: "Baja simulation-distance a {1} o menos."
    title: "simulation-distance alto ({0})"
  high-view-distance:
    detail: "Un view-distance alto multiplica la CPU y el ancho de banda por jugador y amplía la superficie de lag/DoS."
    fix: "Baja view-distance a {1} o menos (lo habitual es 6-10)."
    title: "view-distance alto ({0})"
  host-readable-ops:
    detail: "ops.json (la lista de cuentas de operador y sus UUID) lo puede leer cualquier otro usuario de esta máquina, lo que le sirve a un atacante una lista ya hecha de las cuentas de mayor valor a las que apuntar.{0}"
    fix: "Restríngelo para que solo lo pueda leer el usuario del servidor (por ejemplo, chmod 600 ops.json)."
    title: "ops.json es legible por todo el mundo"
  host-readable-secret:
    detail: "server.properties lo puede leer cualquier otra cuenta de usuario de esta máquina, y contiene tu contraseña de RCON en texto plano; así que cualquier usuario local (o un plugin comprometido que se ejecute como otro usuario) puede leerla.{0}"
    fix: "Restríngelo para que solo lo pueda leer el propio usuario del servidor (por ejemplo, chmod 600 server.properties)."
    title: "server.properties es legible por todo el mundo y contiene una contraseña de RCON"
  host-writable-plugins:
    detail: "La carpeta plugins o sus jars los pueden escribir otros usuarios del sistema, así que cualquiera con acceso a una shell en este host podría sustituir un plugin por uno con puerta trasera: un ataque local a la cadena de suministro.{0}"
    fix: "Ajusta la propiedad/permisos para que solo el usuario del servidor pueda escribir en plugins/ (por ejemplo, chown al usuario del servidor y chmod 750)."
    title: "Los jars de plugin son escribibles por todo el mundo"
  host-writable-root:
    detail: "El directorio de trabajo del servidor lo pueden escribir otros usuarios del sistema, así que cualquiera con acceso a una shell en este host podría dejar o sustituir archivos que el servidor carga (configuraciones, jars, scripts de arranque): un ataque local a la cadena de suministro.{0}"
    fix: "Ajústalo para que solo el usuario del servidor pueda escribir: haz chown del directorio al usuario del servidor y ponlo en chmod 750."
    title: "El directorio del servidor es escribible por todo el mundo"
  insecure-chat:
    detail: "enforce-secure-profile=false permite que los clientes chateen sin mensajes firmados criptográficamente (1.19+). Eso debilita la trazabilidad de los mensajes y el sistema de denuncia del chat, y deja entrar a clientes no estándar que no pueden firmar el chat."
    fix: "Pon enforce-secure-profile=true salvo que necesites específicamente dar soporte a clientes que no pueden firmar el chat."
    title: "No se exige el chat firmado"
  jmx-enabled:
    detail: "enable-jmx-monitoring=true abre una interfaz de gestión JMX. Si su puerto es accesible (sobre todo sin autenticación de JMX ni TLS), es una superficie de gestión remota que puede filtrar información interna o, en algunas configuraciones, convertirse en ejecución remota de código."
    fix: "Pon enable-jmx-monitoring=false salvo que uses JMX activamente; si lo usas, enlázalo a localhost con autenticación y TLS."
    title: "La monitorización JMX está habilitada"
  jvm-heap:
    detail: "El heap máximo de la JVM (-Xmx ~{0} MB) es el {1}% de la RAM de la máquina (~{2} MB). Eso deja casi nada para el sistema operativo, la memoria fuera del heap y otros procesos, así que el servidor se arriesga a que lo mate el OOM o a hacer tanto swapping que vaya a rastras."
    fix: "Deja margen: pon -Xmx en torno al 70-80% de la RAM (y Xms igual a Xmx), teniendo en cuenta cualquier otra cosa que corra en la máquina."
    title: "El heap de la JVM es casi toda la RAM del sistema"
  log4shell:
    detail: "Se detectó Minecraft {0}, del periodo afectado por CVE-2021-44228 (Log4Shell). Que estés realmente expuesto depende de tu build: los jars de Paper/Spigot del 2021-12-10 o posteriores incorporan un Log4j parcheado (2.15+) y son seguros."
    fix: "Asegúrate de que tu jar del servidor sea un build del 2021-12-10 o posterior (o actualiza a 1.18.1+), o arranca con -Dlog4j2.formatMsgNoLookups=true."
    title: "Versión de Minecraft de la época de Log4Shell"
  many-operators:
    detail: ")"
    fix: "Hay "
    title: "Muchos operadores del servidor ("
  no-proxy-protection:
    detail: "prevent-proxy-connections=false (el valor por defecto) deja desactivada la propia comprobación de proxy de Mojang, así que no se rechazan las conexiones a través de proxies conocidos. Esto es solo la opción de vanilla; un plugin AntiVPN dedicado hace un trabajo mucho mejor."
    fix: "Pon prevent-proxy-connections=true para una comprobación ligera de vanilla, o usa un plugin AntiVPN si los bots o la evasión de baneos son un problema."
    title: "Conexiones VPN/proxy sin bloquear (opción de vanilla)"
  no-rate-limit:
    detail: "rate-limit=0 es el valor de fábrica y deja desactivado el límite de paquetes por conexión, así que el propio servidor no descarta a un cliente que inunde o intente tirarlo. Paper tiene sus propias protecciones de paquetes, así que tómalo como un endurecimiento opcional, no como un agujero abierto."
    fix: "Opcionalmente, pon rate-limit en algo como 300 para que se descarte a los clientes abusivos; comprueba que no afecte a los jugadores normales."
    title: "Sin límite de tasa de paquetes (por defecto)"
  no-server-properties:
    detail: "Bulwark no pudo encontrar server.properties junto al jar del servidor, así que se omitieron algunas comprobaciones. Esto es normal en un proxy."
    fix: "Ejecuta Bulwark en el propio servidor de juego, o revisa los permisos del archivo."
    title: "server.properties no encontrado"
  no-spawn-protection:
    detail: "spawn-protection=0 permite que quienes no son operadores construyan y rompan en el spawn. Eso está perfectamente bien si proteges el spawn con un plugin de regiones (WorldGuard, etc.); se señala solo a modo informativo."
    fix: "Pon un radio pequeño (por ejemplo, 16), o ignóralo si un plugin de regiones ya protege el spawn."
    title: "Sin protección de spawn de vanilla"
  no-whitelist:
    detail: "white-list=false significa que puede entrar cualquiera que conozca la dirección. Está bien para un servidor público, pero es arriesgado en uno privado o de pruebas."
    fix: "Pon white-list=true (y enforce-whitelist=true) si este servidor está pensado para ser privado."
    title: "La whitelist está desactivada"
  offline-mode:
    detail: "online-mode=false sin proxy detectado y sin ningún plugin de login encontrado. Cualquiera puede entrar como CUALQUIER nombre de usuario, incluidos tus administradores, sin autenticación. Es el mayor agujero de seguridad de cuentas que existe."
    fix: "Pon online-mode=true en server.properties y reinicia. Usa el modo offline solo detrás de un proxy correctamente cerrado por firewall, o con un plugin de login (AuthMe) que exija contraseñas."
    title: "El servidor está en modo offline"
  offline-mode-login:
    detail: "online-mode=false sin proxy, pero hay un plugin de login (AuthMe/nLogin/...) instalado para autenticar a los jugadores. Eso mitiga el mayor riesgo, pero el modo offline sigue siendo más débil que una autenticación real (una contraseña filtrada es lo único que protege una cuenta, y un plugin de login mal configurado vuelve a abrir el agujero)."
    fix: "Usa online-mode=true si no necesitas específicamente jugadores cracked/offline; de lo contrario, asegúrate de que el plugin de login exige registro y contraseñas fuertes."
    title: "Modo offline (un plugin de login se encarga de la autenticación)"
  offline-mode-proxy:
    detail: "online-mode está en false, lo cual es lo esperado cuando un proxy (BungeeCord/Velocity) se encarga del login."
    fix: "Asegúrate de que el puerto del servidor esté cerrado por firewall para que solo el proxy pueda alcanzarlo y de que esté activado el reenvío moderno (Velocity) o BungeeGuard; de lo contrario, cualquiera puede conectarse directamente como cualquier jugador."
    title: "Modo offline (proxy detectado)"
  old-java:
    detail: "java.version"
    fix: "?"
    title: "Java desactualizado ("
  process-as-root:
    detail: "El servidor de Minecraft se ejecuta como el usuario root. Cualquier plugin (o un fallo de ejecución remota de código en uno de ellos) controla entonces toda la máquina, no solo el servidor. Es el peor alcance de daño posible ante un compromiso.{0}"
    fix: "Ejecuta el servidor como un usuario dedicado sin privilegios de root: crea uno, haz chown de los archivos del servidor a ese usuario y arranca el servicio como ese usuario."
    title: "El proceso del servidor se está ejecutando como root"
  query-enabled:
    detail: "enable-query=true expone información en vivo del servidor (jugadores, versión) a cualquiera, algo que los atacantes usan para identificar servidores y elegir objetivos."
    fix: "Pon enable-query=false salvo que alguna herramienta que uses lo necesite de verdad."
    title: "Protocolo de query habilitado"
  query-plugins:
    detail: "bukkit.yml settings.query-plugins=true hace que el protocolo de query (habilitado) reparta tu lista exacta de plugins y sus versiones, algo que los atacantes usan para identificar plugins con vulnerabilidades conocidas en tu servidor."
    fix: "Pon query-plugins=false en bukkit.yml, o desactiva el protocolo de query por completo con enable-query=false en server.properties."
    title: "La query expone la lista completa de plugins"
  rcon-enabled:
    detail: "La consola remota está activada. Incluso con una contraseña fuerte, un puerto de RCON expuesto es un riesgo de control remoto."
    fix: "Cierra el puerto de RCON por firewall para que solo tú puedas alcanzarlo, o desactívalo cuando no lo uses."
    title: "RCON está habilitado"
  rcon-no-password:
    detail: "La consola remota (RCON) está activada con una contraseña vacía; eso es control remoto total de tu servidor para cualquiera que pueda alcanzar el puerto de RCON."
    fix: "Pon una rcon.password aleatoria y larga, o desactiva RCON (enable-rcon=false) si no lo usas. Nunca expongas el puerto de RCON a internet."
    title: "RCON habilitado sin contraseña"
  rcon-weak-password:
    detail: "RCON está habilitado con una contraseña corta ({0} caracteres), que es vulnerable a fuerza bruta."
    fix: "Usa una contraseña aleatoria de 16 caracteres o más y cierra el puerto de RCON por firewall solo a localhost/administrador."
    title: "La contraseña de RCON es débil"
  resource-pack-no-sha:
    detail: "Hay una URL de resource-pack definida pero resource-pack-sha1 está vacío, así que los clientes no pueden verificar el pack: un atacante por intermediario podría cambiarlo por uno alterado, y los clientes vuelven a descargarlo en cada entrada."
    fix: "Pon en resource-pack-sha1 el SHA-1 del archivo de pack exacto que sirves."
    title: "Resource pack servido sin un SHA-1"
  unsupported-exploit:
    detail: "unsupported-settings.{0} de Paper está en true, lo que reactiva intencionadamente un exploit o duplicado conocido."
    fix: "Vuelve a poner {0} en false salvo que entiendas del todo las consecuencias."
    title: "Ajuste peligroso de 'unsupported' habilitado"
  velocity-no-secret:
    detail: "El reenvío moderno de Velocity está activado pero el secreto está vacío, así que el backend no puede verificar el proxy: se puede suplantar a los jugadores."
    fix: "Define el mismo secreto de reenvío en el proxy y en el secreto de Velocity del servidor."
    title: "Reenvío de Velocity sin un secreto"
    detail: "max-tick-time={0} desactiva el watchdog de un solo tick, así que un tick colgado o en interbloqueo no dispara la salvaguarda de crash/reinicio: el servidor puede congelarse indefinidamente en vez de recuperarse."
    fix: "Deja max-tick-time en el valor por defecto (60000) salvo que tengas un motivo concreto, para que un servidor congelado se detecte y se reinicie."
    title: "Watchdog del servidor desactivado (max-tick-time)"
    detail: "spigot.yml timeout-time no es positivo, así que el watchdog no reiniciará un servidor congelado."
    fix: "Deja timeout-time en un valor razonable (por ejemplo, 60) para que un servidor colgado se recupere por sí solo."
    title: "Watchdog del servidor prácticamente desactivado"
  whitelist-not-enforced:
    detail: "La whitelist está activada pero enforce-whitelist=false, así que a un jugador al que se le quita estando conectado no se le expulsa."
    fix: "Pon enforce-whitelist=true para que los cambios en la whitelist se apliquen al instante."
    title: "La whitelist no se aplica en vivo"
