findings:
  gap-no-anticheat:
    title: "Kein Anti-Cheat erkannt"
    detail: "Bulwark auditiert die Konfiguration, nicht das Cheaten im Spiel. Es wurde kein Anti-Cheat-Plugin gefunden."
    fix: "Erwäge Grim (kostenlos) oder Vulcan, falls Spieler auf diesem Server cheaten können."
  gap-no-backup:
    title: "Kein Backup-Plugin erkannt"
    detail: "Es wurde kein Backup-Plugin gefunden. (Du kannst weiterhin per Host-Snapshots oder Cron sichern - dies prüft nur auf ein Plugin.)"
    fix: "Erwäge ein Backup-Plugin oder stelle sicher, dass Backups auf andere Weise laufen."
  gap-no-logging:
    title: "Kein Änderungs-Logger erkannt"
    detail: "Es wurde kein Block-/Inventar-Logger gefunden, daher kannst du Grief und Diebstahl nachträglich weder rückgängig machen noch nachverfolgen."
    fix: "Erwäge CoreProtect (kostenlos) für forensisches Rückgängigmachen."
  accepts-transfers:
    detail: "accepts-transfers=true erlaubt einem anderen Server, seine verbundenen Spieler über das Transfer-Paket ab 1.20.5+ (mit einem Cookie) an DIESEN Server zu übergeben. Aktiviere es nur, wenn du ein transfer-basiertes Netzwerk betreibst - andernfalls vergrößert es, was deinen Server erreichen kann und wie weit er einem vorgelagerten Server vertraut."
    fix: "Setze accepts-transfers=false, sofern du nicht gezielt serverübergreifende Transfers nutzt."
    title: "Server akzeptiert Client-Transfers"
  bad-username-validation:
    detail: "perform-username-validation=false erlaubt Spielern den Beitritt mit Namen, die ungewöhnliche Zeichen enthalten. Das kann namensbezogene Daten beschädigen und missbraucht werden, um über Benutzernamen in Befehlen/Logs zu spoofen oder zu injizieren."
    fix: "Setze perform-username-validation wieder auf true."
    title: "Benutzernamen-Prüfung deaktiviert"
  bungeecord-mode:
    detail: "settings.bungeecord=true bringt den Server dazu, der vom Proxy gesendeten Spieler-Identität zu vertrauen. Ist der Server-Port direkt erreichbar, können Angreifer den Proxy umgehen und JEDEN Spieler/jede UUID spoofen, auch die von Admins."
    fix: " (BungeeGuard ist installiert, was ein Weiterleitungs-Token hinzufügt - halte dessen Secret gesetzt und den Port per Firewall geschützt.)"
    title: "BungeeCord-Modus vertraut dem Proxy"
  command-blocks-enabled:
    detail: "enable-command-block=true lässt Befehlsblöcke Befehle auf Spielleiter-Ebene ausführen. Für Redstone-/Adventure-Maps in Ordnung; auf einem Survival-Server mit vielen Operatoren oder Kreativ-Zugang eine breitere Angriffsfläche."
    fix: "Setze enable-command-block=false, falls dein Server keine Befehlsblock-Konstruktionen nutzt."
    title: "Befehlsblöcke sind aktiviert"
  command-dangerous-default-permission:
    detail: "Diese Kommando-Labels deklarieren keine Bukkit-Permission oder eine Default-Permission fuer alle: {0}. Das sind nur Metadaten; Bulwark behauptet nicht, dass ein bestimmter Spieler sie ausfuehren kann."
    fix: "Gib diesen Kommandos explizite Staff-only-Permissions in deinem Permissions-Plugin und teste mit einem Nicht-Staff-Account."
    title: "Riskante Kommandos mit oeffentlich wirkenden Defaults"
  command-disclosure-public:
    detail: "Kommandos wie {0} sind public oder default-everyone deklariert. Sie koennen Server-Software oder Plugin-Namen fuer Nutzer sichtbar machen."
    fix: "Wenn du kein oeffentliches Fingerprinting willst, beschraenke diese Permissions oder deaktiviere public Plugin-/Versions-Kommandos."
    title: "Oeffentliche Kommando-Metadaten sichtbar"
  command-lifecycle-exposed:
    detail: "Lifecycle-Kommandos wie {0} deklarieren keine Bukkit-Permission oder eine Default-Permission fuer alle. Diese Labels sollten fuer normale Spieler nie erreichbar sein."
    fix: "Beschraenke Lifecycle-Kommandos auf vertraute Operatoren und nutze fuer Betrieb bevorzugt die Konsole."
    title: "Lifecycle-Kommandos mit oeffentlich wirkenden Defaults"
  command-namespace-op-reachable:
    detail: "Bulwark fand namespaced Operator-Kommandos wie {0}. Das heisst nicht, dass Spieler sie ausfuehren koennen; es heisst, dass kuenftige Kommando-Policies Namespaces beachten muessen."
    fix: "Stelle sicher, dass Kommando-Policies exakte Labels und Namespaces pruefen, nicht nur Aliasnamen wie /op."
    title: "Namespaced Operator-Kommandos sichtbar"
  command-plugin-manager-risk:
    detail: "Bulwark fand Plugin-Manager-Kommandos wie {0}. Diese Tools sind fuer Admins nuetzlich, koennen aber bei Exposition Plugins entladen/neu laden und einen Incident vergroessern."
    fix: "Beschraenke Plugin-Manager-Kommandos auf vertraute Operatoren oder entferne das Plugin aus Produktion, wenn du es nur zum Testen nutzt."
    title: "Plugin-Manager-Kommandos installiert"
  command-shadowed-alias:
    detail: "Mehrere Kommando-Owner stellen dasselbe sensible Label bereit: {0}. Das kann Staff verwirren und naive Filter umgehen, die nur einen Owner pruefen."
    fix: "Pruefe diese Duplikate und nutze bei Bedarf exakte namespaced Policies."
    title: "Sensible Kommando-Labels sind doppelt"
  command-surface-unavailable:
    detail: "Bulwark konnte die Live-Command-Map auf dieser Plattform nicht lesen ({0}). Das senkt die Note nicht, bedeutet aber, dass Command-Exposure-Checks übersprungen oder auf plugin.yml-Metadaten begrenzt wurden, statt als sauber zu gelten."
    fix: "Pruefe die Konsole auf Plattformfehler. Bei Hybrid- oder Custom-Forks sollte die Kommando-Exposition manuell geprueft werden."
    title: "Kommandoflaeche konnte nicht gelesen werden"
  command-tabcomplete-disclosure:
    detail: "Sensible Kommando-Labels existieren in der Kommandokarte ({0}). Wenn Tab-Complete fuer Spieler offen ist, koennen diese Namen sichtbar werden, auch wenn Ausfuehrung permission-geschuetzt bleibt."
    fix: "Wenn Kommando-Geheimhaltung wichtig ist, beschraenke Tab-Complete-Vorschlaege ueber Plattform oder Permissions."
    title: "Tab-Complete kann sensible Kommandos zeigen"
  anti-xray-off-public-survival:
    detail: "Bulwark konnte Papers Anti-Xray-Einstellung lesen; sie ist deaktiviert, während das aktive Profil public-survival ist. Bulwark ersetzt kein Anti-Cheat, aber das ist ein sinnvoller Posture-Check für Survival-Server."
    fix: "Aktiviere Paper Anti-Xray, wenn Erz-Sichtbarkeit auf diesem Server wichtig ist, und teste Engine-Modus und Performance vor Produktion."
    title: "Paper Anti-Xray ist für ein öffentliches Survival-Profil aus"
  floodgate-key-readable:
    detail: "{0} kann von anderen lokalen Benutzern gelesen werden. Floodgate-Schlüssel authentifizieren Bedrock-Identity-Forwarding; geleakte Schlüssel vergrößern Spoofing-Auswirkungen."
    fix: "Beschränke den Schlüssel so, dass nur der Minecraft-Serverbenutzer ihn lesen kann, und rotiere ihn bei Verdacht auf Offenlegung."
    title: "Floodgate-Schlüssel ist für andere OS-Benutzer lesbar"
  floodgate-key-writable:
    detail: "{0} kann von anderen lokalen Benutzern geändert werden. Ein lokaler Benutzer oder kompromittierter Prozess könnte den Forwarding-Schlüssel ersetzen."
    fix: "Beschränke Besitzer und Berechtigungen des Schlüssels und starte die Proxy/Backend-Komponenten neu, die ihn nutzen."
    title: "Floodgate-Schlüssel ist für andere OS-Benutzer schreibbar"
  geyser-auth-type-mismatch:
    detail: "Floodgate ist installiert, aber Geyser remote.auth-type ist '{0}' statt floodgate. Das kann den falschen Bedrock-Authentifizierungsfluss erzwingen."
    fix: "Setze remote.auth-type auf floodgate, wenn dieses Backend Floodgate nutzen soll, oder entferne Floodgate, wenn es unbenutzt ist."
    title: "Geyser auth-type passt nicht zu Floodgate"
  posture-profile-auto:
    detail: "Bulwark nutzt das Posture-Profil {0} anhand lokaler Evidenz: {1}. Auto-Profil ist sichtbare Evidenz, keine versteckte Vertrauensentscheidung."
    fix: "Wenn dieses Profil falsch ist, setze security-profile explizit in config.yml."
    title: "Sicherheitsprofil automatisch abgeleitet"
  posture-profile-invalid:
    detail: "security-profile ist auf '{0}' gesetzt, was Bulwark nicht kennt. Es wurde Auto-Erkennung genutzt: {1}."
    fix: "Setze security-profile auf auto, public-survival, private-smp, minigame, creative-build, proxy-backend oder modded."
    title: "Unbekanntes Sicherheitsprofil konfiguriert"
  posture-profile-unconfirmed:
    detail: "security-profile ist {0}, aber security-profile-confirmed ist false. Bulwark zeigt es als konfiguriert, aber nicht bestätigt."
    fix: "Setze security-profile-confirmed=true, nachdem du geprüft hast, dass das Profil zu diesem Server passt."
    title: "Sicherheitsprofil ist nicht bestätigt"
  profile-private-whitelist-open:
    detail: "Dieser Server wird als private-smp behandelt, aber white-list=false lässt jeden beitreten, der die Adresse kennt."
    fix: "Aktiviere Whitelist und enforce-whitelist, oder ändere security-profile, wenn der Server absichtlich öffentlich ist."
    title: "Private-SMP-Profil, aber Whitelist offen"
  proxy-backend-firewall-unverified:
    detail: "Bulwark hat ein proxy-backend-Profil erkannt. Aus Bukkit kann es Forwarding-Konfig lesen, aber nicht beweisen, dass der Backend-Port vom öffentlichen Internet gefirewallt ist."
    fix: "Bestätige auf Firewall- oder Panel-Ebene, dass nur der Proxy diesen Backend-Port erreichen kann."
    title: "Proxy-Backend-Exposition lokal nicht beweisbar"
  consent-needed:
    detail: "Bulwark hat noch nichts auditiert. Es braucht deine Zustimmung, bevor es Server-Konfiguration, Host-Einstellungen und Logs liest. Logs koennen PII wie Chat, Spielernamen, IPs und Befehle enthalten; alles bleibt lokal und nur lesend."
    fix: "Führe /bulwark consent aus, um das Audit zu autorisieren (du kannst es jederzeit mit /bulwark consent off widerrufen)."
    title: "Audit noch nicht autorisiert"
  log-auth-failed:
    detail: "Das Log enthaelt fehlgeschlagene Login- oder Session-Pruefungen. Wenige sind normal; Bursts koennen Bots oder Account-Probleme zeigen."
    fix: "Vergleiche es mit Verbindungsrate und Proxy-Konfiguration, bevor du handelst."
    title: "Authentifizierungsfehler im Log"
  log-command-issued:
    detail: "Die Probe enthaelt Befehlsausfuehrungen. Das ist normal, hilft aber bei der Pruefung verdaechtiger Aktivitaet."
    fix: "Pruefe die Quelle des Befehls im Kontext und schuetze Logs, weil sie private Staff-Aktionen enthalten koennen."
    title: "Befehlsausfuehrung im Log"
  log-file-missing:
    detail: "Bulwark konnte logs/latest.log nicht lesen. Das Log-Audit bleibt inaktiv und beeinflusst die Sicherheitsnote nicht."
    fix: "Pruefe, dass der Server logs/latest.log schreibt und der Prozessbenutzer es lesen kann."
    title: "latest.log konnte nicht gelesen werden"
  log-jndi-probe:
    detail: "Eine Zeile enthaelt einen literal ${jndi:-Lookup. Moderne Server neutralisieren das normalerweise, aber es bleibt ein Angriffssignal mit hoher Sicherheit."
    fix: "Bestaetige, dass Java und Server-Version unterstuetzt sind, halte alte Mitigations aktiv und pruefe die Quelle der Zeile."
    title: "Log4Shell-artiger Lookup im Log"
  log-operators-load-failed:
    detail: "Der Server konnte die Operatorenliste nicht laden. Staff-Zugriff kann anders sein als erwartet."
    fix: "Pruefe Syntax und Rechte von ops.json, dann starte oder lade vorsichtig neu."
    title: "Operatorenliste konnte nicht geladen werden"
  log-paper-crash-report:
    detail: "Paper hat sein Crash-Report-Banner ausgegeben. Die Probe enthaelt Hinweise auf Crash oder fatalen Watchdog-Pfad."
    fix: "Lies den von Paper genannten Crash-Report und pruefe Plugins direkt vor dem Banner."
    title: "Paper-Crash-Banner gefunden"
  log-player-moved-too-quickly:
    detail: "Der Server loggte moved-too-quickly. Das ist nur ein Symptom; Lag, Teleports, Elytra und Plugins koennen es ausloesen."
    fix: "Nutze es als Kontext fuer Anti-Cheat-Tuning, nicht als Beweis oder Strafausloeser."
    title: "Bewegungsanomalie im Log"
  log-player-moved-wrongly:
    detail: "Der Server loggte moved-wrongly. Das kann bei Lag, Teleports, Fahrzeugen oder Kollisionskanten passieren."
    fix: "Nutze es nur als Betriebssignal; handle nicht ohne Live-Evidenz vom Anti-Cheat."
    title: "Bewegungskorrektur im Log"
  log-plugin-enable-error:
    detail: "Ein Plugin warf beim Enable einen Fehler. Schutz kann teilweise geladen oder still fehlen."
    fix: "Pruefe das genannte Plugin, aktualisiere es oder entferne es, bis es sauber startet."
    title: "Plugin schlug beim Enable fehl"
  log-plugin-exception:
    detail: "Eine Plugin-Exception wurde geloggt. Ein wiederholter Stack kann viele Zeilen erzeugen, daher zaehlt Bulwark nur Signalzeilen."
    fix: "Pruefe das Plugin um die Exception herum und reproduziere mit aktuellen Plugin-/Server-Builds."
    title: "Plugin-Exception im Log"
  log-plugin-load-error:
    detail: "Der Server konnte ein Plugin-Jar nicht laden. Wenn es Security oder Dependency betrifft, kann der Server offen bleiben."
    fix: "Pruefe Jar-Version, Dependencies und Java/Minecraft-Kompatibilitaet, dann starte nach der Korrektur neu."
    title: "Plugin-Jar konnte nicht laden"
  log-server-overloaded:
    detail: "Minecraft loggte die can't-keep-up-Warnung. Das ist ein Symptom fuer Tick-Lag, ueberlastete Hardware oder schwere Plugin-/Weltarbeit."
    fix: "Vergleiche Spielerzahl und aktuelle Aenderungen; profile, bevor du zufaellige Performance-Settings aenderst."
    title: "Server-Ueberlastungswarnung"
  log-watchdog-freeze:
    detail: "Der Server loggte einen einzelnen zu langen Tick. Das deutet oft auf harten Stall, ausufernde Plugin-Task oder schwere Weltlast hin."
    fix: "Pruefe den Zeitpunkt der Zeile, erfasse timings/spark und kontrolliere aktuelle Plugin- oder Datapack-Aenderungen."
    title: "Watchdog-Freeze geloggt"
  log-whitelist-load-failed:
    detail: "Der Server konnte die Whitelist nicht laden. Zugriffskontrolle passt eventuell nicht zur gewollten Private-Server-Posture."
    fix: "Pruefe whitelist.json und Rechte, dann bestaetige, dass Whitelist-Enforcement aktiv ist."
    title: "Whitelist konnte nicht geladen werden"
  console-all-permissions:
    detail: "console.has-all-permissions=true gibt der Konsole (und jedem Plugin, das Befehle als Konsole ausführt) jede Berechtigung und umgeht so die Berechtigungsprüfungen der Plugins. Leitet ein Plugin nicht vertrauenswürdige Eingaben an die Konsole weiter, ist das ein Pfad zur Rechteausweitung."
    fix: "Setze console.has-all-permissions=false, damit die Konsole die Plugin-Berechtigungen respektiert."
    title: "Konsole hat alle Berechtigungen"
  duplicate-plugins:
    detail: "Mehr als ein Jar deklariert dasselbe Plugin: {1}. Doppelte oder alte Kopien führen zu Konflikten, dem Laden der falschen Version und schwer auffindbaren Fehlern."
    fix: "Behalte pro Plugin ein einziges, aktuelles Jar in /plugins und lösche die übrigen."
    title: "Doppelte Plugin-Jars ({0})"
  plugin-trust-drift:
    detail: "Seit der vertrauenswürdigen Basislinie wurden {0} Plugin-Jar-Änderung(en) erkannt: {1}. Ein geändertes, fehlendes oder unerwartetes Jar kann ein schlechtes Update, eine übrig gebliebene Kopie oder Manipulation bedeuten."
    fix: "Wenn das beabsichtigt war, prüfe die Download-Quelle und führe /bulwark trust baseline aus. Andernfalls entferne das unbekannte Jar und stelle das erwartete aus einem sauberen Backup wieder her."
    title: "Plugin-Jars seit der vertrauenswürdigen Basislinie geändert"
  floodgate-online-mode:
    detail: "Floodgate/Geyser ist installiert, aber online-mode=false. Floodgate authentifiziert Bedrock-Spieler selbst und ist darauf ausgelegt, mit online-mode=true zu laufen - es braucht KEINEN Offline-Modus. Offline zu laufen schwächt hier die Sicherheit der Java-Konten ohne Bedrock-Vorteil."
    fix: "Setze online-mode=true und lass Floodgate die Bedrock-Authentifizierung übernehmen (gemäß der GeyserMC-Dokumentation)."
    title: "Floodgate/Geyser läuft im Offline-Modus"
  forge-mod-surface:
    detail: "Dieser Server laeuft mit {0}. Mods laufen mit vollem JVM-Zugriff und durchlaufen nicht das Berechtigungssystem von Bukkit, daher deckt die Note von Bulwark nur die Bukkit-/Plugin-Schicht ab - nicht die Mods."
    fix: "Auditiere deine Mods separat und betreibe nur Mods, denen du vertraust."
    title: "Mods laufen ausserhalb dieses Audits"
  loader-anticheat-context:
    detail: "Bulwark hat {0} erkannt. Generische Bukkit-Anti-Cheat-Empfehlungen passen moeglicherweise nicht zu modded/hybrid Servern, daher wird dies als Loader-Kontext gemeldet."
    fix: "Nutze einen Anti-Cheat- oder Moderations-Stack, der mit genau diesem Loader und dieser Minecraft-Version getestet wurde."
    title: "Kein loader-kompatibler Anti-Cheat verifiziert"
  loader-runtime-detected:
    detail: "Bulwark hat {0} erkannt. Loader-bewusste Hinweise reduzieren Bukkit/Paper-Annahmen auf modded oder hybriden Servern."
    fix: "Nutze /bulwark inventory all, um die tatsaechlichen Plugin-/Mod-Jars zu pruefen, und setze security-profile explizit, wenn diese Serverrolle ungewoehnlich ist."
    title: "Runtime-Loader erkannt"
  artifact-mods-without-loader:
    detail: "Bulwark hat {0} Mod-Jar(s) gefunden, aber der Runtime hat Forge, NeoForge, Fabric, Quilt oder einen Bukkit/Mod-Hybrid nicht bestaetigt. Das ist oft ein Restordner, eine Server-Pack-Kopie oder ein Loader-Mismatch."
    fix: "Entferne alte Mod-Jars, oder verifiziere den beabsichtigten Loader und die Version, bevor du diese Mods als aktiv behandelst."
    title: "Mod-Jars ohne bestaetigten Mod-Loader gefunden"
  high-function-permission-level:
    detail: "function-permission-level={0} gibt Datapack-Funktionen die Stufe {0} (3-4 = Spielleiter/Besitzer). Ein nicht vertrauenswürdiges oder kompromittiertes Datapack kann dann Befehle auf Admin-Ebene ausführen."
    fix: "Setze function-permission-level wieder auf 2, sofern ein Datapack, dem du vertraust, nicht wirklich mehr benötigt."
    title: "Funktionen laufen mit erhöhter Berechtigungsstufe ({0})"
  high-op-permission-level:
    detail: "op-permission-level={0} gibt jedem Operator die höchste Stufe, einschließlich /stop sowie Befehlsblock-/Besitzer-Befehlen. Das ist der Standard - nur markiert, damit du weißt, dass du den Schadensradius eines kompromittierten Operators verkleinern kannst."
    fix: "Falls deine Operatoren keine Befehle auf Besitzer-Ebene benötigen, setze op-permission-level auf 3."
    title: "Operatoren haben die maximale Berechtigungsstufe ({0})"
  high-simulation-distance:
    detail: "Eine hohe simulation-distance erhöht die Tick-Last pro Spieler."
    fix: "Senke simulation-distance auf {1} oder darunter."
    title: "Hohe simulation-distance ({0})"
  high-view-distance:
    detail: "Eine hohe view-distance vervielfacht CPU und Bandbreite pro Spieler und vergrößert die Lag-/DoS-Angriffsfläche."
    fix: "Senke view-distance auf {1} oder darunter (6-10 ist üblich)."
    title: "Hohe view-distance ({0})"
  host-readable-ops:
    detail: "ops.json - die Liste der Operator-Konten und ihrer UUIDs - kann von jedem anderen Benutzer auf dieser Maschine gelesen werden und liefert einem Angreifer eine fertige Liste der wertvollsten Ziel-Konten.{0}"
    fix: "Beschränke den Zugriff so, dass nur der Server-Benutzer sie lesen kann (z. B. chmod 600 ops.json)."
    title: "ops.json ist für alle lesbar"
  host-readable-secret:
    detail: "server.properties kann von jedem anderen Benutzerkonto auf dieser Maschine gelesen werden und enthält dein RCON-Passwort im Klartext - jeder lokale Benutzer (oder ein kompromittiertes Plugin, das als anderer Benutzer läuft) kann es also lesen.{0}"
    fix: "Beschränke den Zugriff so, dass nur der eigene Benutzer des Servers sie lesen kann (z. B. chmod 600 server.properties)."
    title: "server.properties ist für alle lesbar und enthält ein RCON-Passwort"
  host-writable-plugins:
    detail: "Der plugins-Ordner oder seine Jars können von anderen OS-Benutzern beschrieben werden, sodass jeder mit einer Shell auf diesem Host ein Plugin durch ein mit Backdoor versehenes ersetzen könnte - ein lokaler Supply-Chain-Angriff.{0}"
    fix: "Verschärfe Eigentümer/Berechtigungen so, dass nur der Server-Benutzer in plugins/ schreiben kann (z. B. mit chown an den Server-Benutzer und chmod 750)."
    title: "Plugin-Jars sind für alle beschreibbar"
  host-writable-root:
    detail: "Das Arbeitsverzeichnis des Servers kann von anderen OS-Benutzern beschrieben werden, sodass jeder mit einer Shell auf diesem Host Dateien ablegen oder ersetzen könnte, die der Server lädt - Konfigurationen, Jars, Startskripte - ein lokaler Supply-Chain-Angriff.{0}"
    fix: "Verschärfe es so, dass nur der Server-Benutzer schreiben kann: setze das Verzeichnis per chown auf den Server-Benutzer und per chmod auf 750."
    title: "Das Server-Verzeichnis ist für alle beschreibbar"
  insecure-chat:
    detail: "enforce-secure-profile=false lässt Clients chatten, ohne kryptografisch signierte Nachrichten (ab 1.19+). Das schwächt die Nachverfolgbarkeit von Nachrichten und das Chat-Reporting-System und lässt nicht-standardkonforme Clients beitreten, die den Chat nicht signieren können."
    fix: "Setze enforce-secure-profile=true, sofern du nicht gezielt Clients unterstützen musst, die den Chat nicht signieren können."
    title: "Signierter Chat wird nicht erzwungen"
  jmx-enabled:
    detail: "enable-jmx-monitoring=true öffnet eine JMX-Verwaltungsschnittstelle. Ist ihr Port erreichbar - besonders ohne JMX-Authentifizierung und TLS -, ist sie eine Fernverwaltungs-Fläche, die Interna preisgeben oder in manchen Setups zu Remote Code Execution umfunktioniert werden kann."
    fix: "Setze enable-jmx-monitoring=false, sofern du JMX nicht aktiv nutzt; falls doch, binde es mit Authentifizierung und TLS an localhost."
    title: "JMX-Monitoring ist aktiviert"
  jvm-heap:
    detail: "Der maximale JVM-Heap (-Xmx ~{0} MB) sind {1}% des RAM der Maschine (~{2} MB). Das lässt fast nichts für das OS, Off-Heap-Speicher und andere Prozesse übrig, sodass der Server riskiert, per OOM beendet zu werden oder sich durch Swapping zum Stillstand zu bringen."
    fix: "Lass Puffer: setze -Xmx auf etwa 70-80% des RAM (und Xms gleich Xmx) und berücksichtige alles andere, was auf der Maschine läuft."
    title: "JVM-Heap belegt nahezu den gesamten System-RAM"
  log4shell:
    detail: "Minecraft {0} erkannt, aus dem von CVE-2021-44228 (Log4Shell) betroffenen Zeitraum. Ob du tatsächlich angreifbar bist, hängt von deinem Build ab: Paper-/Spigot-Jars ab dem 2021-12-10 enthalten gepatchtes Log4j (2.15+) und sind sicher."
    fix: "Stelle sicher, dass dein Server-Jar ein Build ab dem 2021-12-10 ist (oder aktualisiere auf 1.18.1+), oder starte mit -Dlog4j2.formatMsgNoLookups=true."
    title: "Minecraft-Version aus der Log4Shell-Ära"
  many-operators:
    detail: "Es gibt {0} Ops. Jeder Op hat vollen, ungeprueften Zugriff auf Server und Konsole - eine grosse Angriffsfläche, wenn eines dieser Konten kompromittiert wird."
    fix: "Beschraenke Ops auf die wenigen Personen, die wirklich Vollzugriff brauchen; gib allen anderen gezielte Rechte ueber ein Permission-Plugin (LuckPerms)."
    title: "Viele Server-Operatoren ({0})"
  no-proxy-protection:
    detail: "prevent-proxy-connections=false (der Standard) lässt Mojangs eigene Proxy-Prüfung aus, sodass Verbindungen über bekannte Proxys nicht abgewiesen werden. Das ist nur das Vanilla-Flag - ein dediziertes AntiVPN-Plugin macht das deutlich besser."
    fix: "Setze prevent-proxy-connections=true für eine leichte Vanilla-Prüfung, oder betreibe ein AntiVPN-Plugin, falls Ban-Umgehung/Bots ein Problem sind."
    title: "VPN-/Proxy-Verbindungen werden nicht blockiert (Vanilla-Schalter)"
  no-rate-limit:
    detail: "rate-limit=0 ist der Werksstandard und lässt das Paket-Limit pro Verbindung aus, sodass ein Flood-/Crasher-Client nicht vom Server selbst getrennt wird. Paper hat eigene Paket-Schutzmechanismen, behandle das also als optionale Härtung, nicht als offenes Loch."
    fix: "Setze rate-limit optional auf etwa 300, damit missbräuchliche Clients getrennt werden - teste, dass es normale Spieler nicht beeinträchtigt."
    title: "Kein Paket-Ratenlimit (Standard)"
  no-server-properties:
    detail: "Bulwark konnte server.properties nicht neben dem Server-Jar finden, daher wurden einige Prüfungen übersprungen. Das ist auf einem Proxy normal."
    fix: "Führe Bulwark auf dem Spielserver selbst aus, oder prüfe die Dateiberechtigungen."
    title: "server.properties nicht gefunden"
  no-spawn-protection:
    detail: "spawn-protection=0 erlaubt Nicht-Operatoren, am Spawn zu bauen und abzubauen. Das ist völlig in Ordnung, wenn du den Spawn mit einem Regionen-Plugin (WorldGuard usw.) absicherst - nur zur Information markiert."
    fix: "Setze einen kleinen Radius (z. B. 16), oder ignoriere dies, falls ein Regionen-Plugin den Spawn bereits schützt."
    title: "Kein Vanilla-Spawnschutz"
  no-whitelist:
    detail: "white-list=false bedeutet, dass jeder beitreten kann, der die Adresse kennt. Für einen öffentlichen Server in Ordnung, riskant für einen privaten oder Staging-Server."
    fix: "Setze white-list=true (und enforce-whitelist=true), falls dieser Server privat sein soll."
    title: "Whitelist ist aus"
  offline-mode:
    detail: "online-mode=false, ohne erkannten Proxy und ohne gefundenes Login-Plugin. Jeder kann sich als JEDER Benutzername anmelden - auch als deine Admins - ohne jede Authentifizierung. Das ist das größte Loch in der Konto-Sicherheit überhaupt."
    fix: "Setze online-mode=true in der server.properties und starte neu. Nutze den Offline-Modus nur hinter einem ordentlich per Firewall geschützten Proxy oder mit einem Login-Plugin (AuthMe), das Passwörter erzwingt."
    title: "Server ist im Offline-Modus"
  offline-mode-login:
    detail: "online-mode=false ohne Proxy, aber ein Login-Plugin (AuthMe/nLogin/...) ist installiert, um Spieler zu authentifizieren. Das mindert das größte Risiko - aber der Offline-Modus ist trotzdem schwächer als echte Authentifizierung (ein geleaktes Passwort ist das Einzige, was ein Konto schützt, und ein falsch konfiguriertes Login-Plugin reißt das Loch wieder auf)."
    fix: "Nutze online-mode=true, falls du nicht gezielt geknackte/Offline-Spieler brauchst; andernfalls stelle sicher, dass das Login-Plugin Registrierung und starke Passwörter erzwingt."
    title: "Offline-Modus (ein Login-Plugin übernimmt die Authentifizierung)"
  offline-mode-proxy:
    detail: "online-mode ist false, was zu erwarten ist, wenn ein Proxy (BungeeCord/Velocity) den Login übernimmt."
    fix: "Stelle sicher, dass der Server-Port per Firewall geschützt ist, sodass nur der Proxy ihn erreichen kann, und dass modernes Forwarding (Velocity) oder BungeeGuard aktiviert ist - andernfalls kann jeder direkt als beliebiger Spieler verbinden."
    title: "Offline-Modus (Proxy erkannt)"
  old-java:
    detail: "Du nutzt Java {1}. Aeltere Java-Versionen verpassen Sicherheitsupdates und Performance-Arbeit; modernes Minecraft (1.18+) braucht Java 17+."
    fix: "Aktualisiere auf ein aktuelles LTS-Java (17 oder 21), das zu deiner Minecraft-Version passt."
    title: "Veraltetes Java ({0})"
  process-as-root:
    detail: "Der Minecraft-Server läuft als root-Benutzer. Jedes Plugin - oder ein Remote-Code-Execution-Bug darin - kontrolliert dann die ganze Maschine, nicht nur den Server. Das ist der schlimmstmögliche Schadensradius bei einer Kompromittierung.{0}"
    fix: "Betreibe den Server als dedizierten Nicht-root-Benutzer: lege einen an, setze die Server-Dateien per chown auf ihn und starte den Dienst als dieser Benutzer."
    title: "Server-Prozess läuft als root"
  query-enabled:
    detail: "enable-query=true legt Live-Server-Infos (Spieler, Version) für jeden offen, was Angreifer nutzen, um Server zu fingerprinten und gezielt anzugreifen."
    fix: "Setze enable-query=false, sofern ein Tool, das du betreibst, es nicht wirklich braucht."
    title: "Query-Protokoll aktiviert"
  query-plugins:
    detail: "bukkit.yml settings.query-plugins=true sorgt dafür, dass das (aktivierte) Query-Protokoll deine genaue Plugin-Liste und -Versionen herausgibt, was Angreifer nutzen, um bekannte verwundbare Plugins auf deinem Server zu fingerprinten."
    fix: "Setze query-plugins=false in der bukkit.yml, oder schalte das Query-Protokoll vollständig mit enable-query=false in der server.properties aus."
    title: "Query legt die vollständige Plugin-Liste offen"
  connection-throttle-off:
    detail: "bukkit.yml settings.connection-throttle={0} deaktiviert Bukkit's reconnect delay pro IP. Auf einem Standalone-Server macht das Join-Floods billiger; Bulwark unterdrueckt diesen Fund bei konfiguriertem Proxy-Forwarding, weil Proxy-Backends das oft absichtlich deaktivieren."
    fix: "Setze settings.connection-throttle auf einen positiven Wert wie 4000, sofern dieser Server kein Backend hinter einem korrekt per Firewall geschuetzten Proxy ist."
    title: "Connection throttle ist deaktiviert"
  rcon-enabled:
    detail: "Remote-Konsole ist an. Selbst mit einem starken Passwort ist ein offener RCON-Port ein Fernsteuerungs-Risiko."
    fix: "Schütze den RCON-Port per Firewall, sodass nur du ihn erreichst, oder deaktiviere ihn, wenn er ungenutzt ist."
    title: "RCON ist aktiviert"
  rcon-no-password:
    detail: "Remote-Konsole (RCON) ist an mit leerem Passwort - das ist volle Fernsteuerung deines Servers für jeden, der den RCON-Port erreichen kann."
    fix: "Setze ein langes, zufälliges rcon.password, oder schalte RCON aus (enable-rcon=false), falls du es nicht nutzt. Lege den RCON-Port niemals ins Internet offen."
    title: "RCON aktiviert ohne Passwort"
  rcon-weak-password:
    detail: "RCON ist aktiviert mit einem kurzen Passwort ({0} Zeichen), das per Brute-Force knackbar ist."
    fix: "Verwende ein zufälliges Passwort mit 16+ Zeichen und beschränke den RCON-Port per Firewall auf localhost/Admin."
    title: "RCON-Passwort ist schwach"
  resource-pack-no-sha:
    detail: "Eine resource-pack-URL ist gesetzt, aber resource-pack-sha1 ist leer, sodass Clients das Pack nicht verifizieren können - ein Man-in-the-Middle könnte es gegen ein verändertes austauschen, und Clients laden es bei jedem Beitritt erneut herunter."
    fix: "Setze resource-pack-sha1 auf den SHA-1 genau der Pack-Datei, die du auslieferst."
    title: "Resource Pack ohne SHA-1 ausgeliefert"
  unsupported-exploit:
    detail: "Papers unsupported-settings.{0} ist true, was absichtlich einen bekannten Exploit oder Dupe wieder aktiviert."
    fix: "Setze {0} wieder auf false, sofern du die Konsequenz nicht vollständig verstehst."
    title: "Gefährliche 'unsupported'-Einstellung aktiviert"
  velocity-no-secret:
    detail: "Velocity Modern Forwarding ist an, aber das Secret ist leer, sodass das Backend den Proxy nicht verifizieren kann - Spieler können gespooft werden."
    fix: "Setze dasselbe Forwarding-Secret im Proxy und im Velocity-Secret des Servers."
    title: "Velocity-Forwarding ohne Secret"
  watchdog-max-tick:
    detail: "max-tick-time={0} schaltet den Single-Tick-Watchdog aus, sodass ein hängender oder verklemmter Tick die Crash-/Neustart-Absicherung nicht auslöst - der Server kann unbegrenzt einfrieren, statt sich zu erholen."
    fix: "Belasse max-tick-time auf dem Standard (60000), sofern du keinen bestimmten Grund hast, damit ein eingefrorener Server erkannt und neu gestartet wird."
    title: "Server-Watchdog deaktiviert (max-tick-time)"
  watchdog-off:
    detail: "spigot.yml timeout-time ist nicht positiv, sodass der Watchdog einen eingefrorenen Server nicht neu startet."
    fix: "Belasse timeout-time auf einem sinnvollen Wert (z. B. 60), damit ein hängender Server sich von selbst erholt."
    title: "Server-Watchdog praktisch aus"
  whitelist-not-enforced:
    detail: "Die Whitelist ist an, aber enforce-whitelist=false, sodass ein Spieler, der entfernt wird, während er online ist, nicht gekickt wird."
    fix: "Setze enforce-whitelist=true, damit Whitelist-Änderungen sofort greifen."
    title: "Whitelist wird nicht live erzwungen"
