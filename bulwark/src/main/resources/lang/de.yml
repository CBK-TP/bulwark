  locked-access-guard-desc: "Live-Alarme (und optionales Blockieren) bei /op, /deop und Rechteausweitungen im Moment ihrer Ausführung."
  locked-active-defence-desc: "Echtzeit-Guards, die handeln: eine Befehls-Firewall für gefährliche Befehle, ein Login-Filter, der bösartige Benutzernamen abweist, Operator-Beitritts-Erkennung und ein Lockdown per einzigem Befehl."
