findings:
  accepts-transfers:
    detail: "accepts-transfers=true lets another server hand its connected players to THIS server via the 1.20.5+ transfer packet (carrying a cookie). Only enable it if you run a transfer-based network - otherwise it widens what can reach your server and how much it trusts an upstream server."
    fix: "Set accepts-transfers=false unless you specifically use cross-server transfers."
    title: "Server accepts client transfers"
  bad-username-validation:
    detail: "perform-username-validation=false lets players join with names containing unusual characters. That can break per-name data and be abused to spoof or inject via usernames in commands/logs."
    fix: "Set perform-username-validation back to true."
    title: "Username validation disabled"
  bungeecord-mode:
    detail: "settings.bungeecord=true makes the server trust the player identity sent by the proxy. If the server port is reachable directly, attackers can bypass the proxy and spoof ANY player/UUID, including admins."
    fix: " (BungeeGuard is installed, which adds a forwarding token - keep its secret set and the port firewalled.)"
    title: "BungeeCord mode trusts the proxy"
  command-blocks-enabled:
    detail: "enable-command-block=true lets command blocks run gamemaster-level commands. Fine for redstone/adventure maps; a wider attack surface on a survival server with many ops or creative access."
    fix: "Set enable-command-block=false if your server doesn't use command-block contraptions."
    title: "Command blocks are enabled"
  command-dangerous-default-permission:
    detail: "These command labels declare no Bukkit permission or a default-everyone permission: {0}. This is metadata only; Bulwark is not claiming any specific player can run them."
    fix: "Give these commands explicit staff-only permissions in your permissions plugin and test with a non-staff account."
    title: "Risky commands have public-looking defaults"
  command-disclosure-public:
    detail: "Commands such as {0} are declared as public or default-everyone. They can reveal server software or plugin names to anyone who can run them."
    fix: "If you do not want public fingerprinting, restrict these command permissions or disable public plugin/version commands in your permission setup."
    title: "Public command metadata is visible"
  command-lifecycle-exposed:
    detail: "Lifecycle command labels such as {0} declare no Bukkit permission or a default-everyone permission. These labels should never be reachable by normal players."
    fix: "Restrict lifecycle commands to trusted operators and prefer console-only operational workflows."
    title: "Lifecycle commands have public-looking defaults"
  command-namespace-op-reachable:
    detail: "Bulwark found namespaced operator command labels such as {0}. This does not mean players can run them; it means any future command blocker or allowlist must handle namespaces too."
    fix: "Make sure command policies match exact labels and namespaces, not only bare aliases like /op."
    title: "Namespaced operator commands are visible"
  command-plugin-manager-risk:
    detail: "Bulwark found plugin-manager command labels such as {0}. These tools are useful for admins, but if exposed they can unload/reload plugins and widen incident impact."
    fix: "Keep plugin-manager commands restricted to trusted operators, or remove the plugin from production servers if you only use it for testing."
    title: "Plugin-manager commands are installed"
  command-shadowed-alias:
    detail: "Multiple command owners expose the same sensitive label(s): {0}. This can confuse staff and can bypass naive command filters that only check one owner."
    fix: "Review these duplicates and use exact namespaced command policies where needed."
    title: "Sensitive command labels are shadowed"
  command-surface-unavailable:
    detail: "Bulwark could not read the live command map on this platform ({0}). This does not lower the grade, but it means command exposure checks were skipped or limited to plugin.yml metadata rather than treated as clean."
    fix: "Check the server console for platform-specific errors. If this is a hybrid or custom fork, keep command exposure reviewed manually."
    title: "Command surface could not be read"
  command-tabcomplete-disclosure:
    detail: "Sensitive command labels exist in the command map ({0}). If tab-complete is open to players, those names can be disclosed even when execution is still permission-protected."
    fix: "If command secrecy matters on this server, restrict tab-complete suggestions with your platform/permissions setup."
    title: "Tab-complete can reveal sensitive command names"
  anti-xray-off-public-survival:
    detail: "Bulwark could read Paper's Anti-Xray setting and it is disabled while the active profile is public-survival. Bulwark does not replace anti-cheat, but this is a useful survival-server posture control."
    fix: "Enable Paper Anti-Xray if ore visibility matters on this server, and test the engine mode and performance impact before production."
    title: "Paper Anti-Xray is off for a public survival profile"
  floodgate-key-readable:
    detail: "{0} can be read by other local users. Floodgate keys authenticate Bedrock identity forwarding, so leaked keys widen account-spoofing impact."
    fix: "Restrict the key so only the Minecraft server user can read it, and rotate it if you suspect it was exposed."
    title: "Floodgate key is readable by other OS users"
  floodgate-key-writable:
    detail: "{0} can be modified by other local users. A local user or compromised process could replace the forwarding key."
    fix: "Restrict key ownership and permissions, then restart the proxy/backend components that use it."
    title: "Floodgate key is writable by other OS users"
  geyser-auth-type-mismatch:
    detail: "Floodgate is installed, but Geyser remote.auth-type is '{0}' instead of floodgate. That may force the wrong Bedrock authentication flow."
    fix: "Set remote.auth-type to floodgate if this backend is meant to use Floodgate, or remove Floodgate if it is unused."
    title: "Geyser auth-type does not match Floodgate"
  posture-profile-auto:
    detail: "Bulwark is using the {0} posture profile from local evidence: {1}. Auto profile is visible evidence, not a hidden trust decision."
    fix: "If this profile is wrong, set security-profile explicitly in config.yml."
    title: "Security profile inferred automatically"
  posture-profile-invalid:
    detail: "security-profile is set to '{0}', which Bulwark does not know. It fell back to auto detection: {1}."
    fix: "Set security-profile to auto, public-survival, private-smp, minigame, creative-build, proxy-backend or modded."
    title: "Unknown security profile configured"
  posture-profile-unconfirmed:
    detail: "security-profile is set to {0}, but security-profile-confirmed is false. Bulwark will show this as configured but not confirmed."
    fix: "Set security-profile-confirmed=true after checking that the profile matches this server."
    title: "Security profile is not confirmed"
  profile-private-whitelist-open:
    detail: "This server is being treated as private-smp, but white-list=false lets anyone who knows the address join."
    fix: "Enable the whitelist and enforce-whitelist, or change security-profile if this server is intentionally public."
    title: "Private SMP profile but whitelist is open"
  proxy-backend-firewall-unverified:
    detail: "Bulwark detected a proxy-backend profile. From inside Bukkit it can read forwarding config, but it cannot prove that the backend port is firewalled from the public internet."
    fix: "Confirm at the firewall or panel level that only the proxy can reach this backend port."
    title: "Proxy backend exposure cannot be proven locally"
  consent-needed:
    detail: "Bulwark hasn't scanned anything yet. It needs your one-time consent before it reads this server's config and the host settings - everything is read-only and nothing ever leaves the machine."
    fix: "Run /bulwark consent to authorize the scan (you can revoke it any time with /bulwark consent off)."
    title: "Scan not authorized yet"
  console-all-permissions:
    detail: "console.has-all-permissions=true gives the console (and any plugin that runs commands as the console) every permission, bypassing plugin permission checks. If a plugin routes untrusted input to the console, that's a privilege-escalation path."
    fix: "Set console.has-all-permissions=false so the console respects plugin permissions."
    title: "Console has all permissions"
  duplicate-plugins:
    detail: "More than one jar declares the same plugin: {1}. Duplicate or old copies cause conflicts, the wrong version loading, and hard-to-trace bugs."
    fix: "Keep a single, up-to-date jar per plugin in /plugins and delete the extras."
    title: "Duplicate plugin jars ({0})"
  plugin-trust-drift:
    detail: "{0} plugin jar change(s) were detected since the trusted baseline: {1}. A changed, missing or unexpected jar can mean a bad update, a leftover copy or tampering."
    fix: "If this was intentional, verify the download source and run /bulwark trust baseline. Otherwise remove the unknown jar and restore the expected one from a clean backup."
    title: "Plugin jars changed since the trusted baseline"
  floodgate-online-mode:
    detail: "Floodgate/Geyser is installed but online-mode=false. Floodgate authenticates Bedrock players itself and is designed to run with online-mode=true - it does NOT need offline mode. Running offline here weakens Java-account security for no Bedrock benefit."
    fix: "Set online-mode=true and let Floodgate handle Bedrock authentication (per the GeyserMC docs)."
    title: "Floodgate/Geyser running with offline mode"
  forge-mod-surface:
    detail: "This server is running {0}. Mods run with full JVM access and don't go through Bukkit's permission system, so Bulwark's grade only covers the Bukkit/plugin layer - not the mods."
    fix: "Audit your mods separately and only run mods you trust."
    title: "Mods run outside this audit"
  loader-anticheat-context:
    detail: "Bulwark detected {0}. Generic Bukkit anti-cheat recommendations may not fit modded/hybrid servers, so this is reported as loader context instead of a normal missing-plugin recommendation."
    fix: "Use an anti-cheat or moderation stack tested with this exact loader and Minecraft version."
    title: "No loader-compatible anti-cheat verified"
  loader-runtime-detected:
    detail: "Bulwark detected {0}. Loader-aware findings reduce Bukkit/Paper assumptions on modded or hybrid servers."
    fix: "Use /bulwark inventory all to review the actual plugin/mod jars, and set security-profile explicitly if this server role is unusual."
    title: "Runtime loader detected"
  artifact-mods-without-loader:
    detail: "Bulwark found {0} mod jar(s), but the runtime did not confirm Forge, NeoForge, Fabric, Quilt or a Bukkit/mod hybrid. This is often a leftover folder, a server-pack copy, or a loader mismatch."
    fix: "Remove stale mod jars, or verify the intended loader and version before treating those mods as active."
    title: "Mod jars found without a confirmed mod loader"
  gap-no-anticheat:
    detail: "Bulwark audits configuration, not gameplay cheating. No anti-cheat plugin was found."
    fix: "Consider Grim (free) or Vulcan if players can cheat on this server."
    title: "No anti-cheat detected"
  gap-no-backup:
    detail: "No backup plugin was found. (You may still back up with host snapshots or cron - this only checks for a plugin.)"
    fix: "Consider a backup plugin, or make sure backups run another way."
    title: "No backup plugin detected"
  gap-no-logging:
    detail: "No block/inventory logger was found, so you can't roll back or trace grief and theft after the fact."
    fix: "Consider CoreProtect (free) for forensic rollback."
    title: "No change logger detected"
  high-function-permission-level:
    detail: "function-permission-level={0} gives datapack functions level {0} (3-4 = gamemaster/owner). An untrusted or compromised datapack can then run admin-level commands."
    fix: "Set function-permission-level back to 2 unless a datapack you trust truly needs more."
    title: "Functions run with an elevated permission level ({0})"
  high-op-permission-level:
    detail: "op-permission-level={0} gives every op the highest level, including /stop and command-block/owner commands. That's the default - flagged only so you know you can shrink the blast radius of a compromised op."
    fix: "If your ops don't need owner-level commands, set op-permission-level to 3."
    title: "Operators have the maximum permission level ({0})"
  high-simulation-distance:
    detail: "A high simulation-distance increases the per-player tick load."
    fix: "Lower simulation-distance to {1} or below."
    title: "High simulation-distance ({0})"
  high-view-distance:
    detail: "A high view-distance multiplies CPU and bandwidth per player and widens the lag/DoS surface."
    fix: "Lower view-distance to {1} or below (6-10 is typical)."
    title: "High view-distance ({0})"
  host-readable-ops:
    detail: "ops.json - the list of operator accounts and their UUIDs - can be read by any other user on this machine, handing an attacker a ready-made list of the highest-value accounts to target.{0}"
    fix: "Restrict it so only the server user can read it (e.g. chmod 600 ops.json)."
    title: "ops.json is world-readable"
  host-readable-secret:
    detail: "server.properties can be read by any other user account on this machine, and it contains your RCON password in plain text - so any local user (or a compromised plugin running as another user) can read it.{0}"
    fix: "Restrict it so only the server's own user can read it (e.g. chmod 600 server.properties)."
    title: "server.properties is world-readable and holds an RCON password"
  host-writable-plugins:
    detail: "The plugins folder or its jars can be written by other OS users, so anyone with a shell on this host could replace a plugin with a backdoored one - a local supply-chain attack.{0}"
    fix: "Tighten ownership/permissions so only the server user can write to plugins/ (e.g. chown to the server user and chmod 750)."
    title: "Plugin jars are world-writable"
  host-writable-root:
    detail: "The server's working directory can be written by other OS users, so anyone with a shell on this host could drop or replace files the server loads - configs, jars, start scripts - a local supply-chain attack.{0}"
    fix: "Tighten it so only the server user can write: chown the directory to the server user and chmod it to 750."
    title: "The server directory is world-writable"
  insecure-chat:
    detail: "enforce-secure-profile=false lets clients chat without cryptographically-signed messages (1.19+). That weakens message traceability and the chat-reporting system, and lets non-standard clients that can't sign chat join."
    fix: "Set enforce-secure-profile=true unless you specifically need to support clients that can't sign chat."
    title: "Signed chat not enforced"
  jmx-enabled:
    detail: "enable-jmx-monitoring=true opens a JMX management interface. If its port is reachable - especially without JMX authentication and TLS - it's a remote-management surface that can leak internals or, in some setups, be turned into remote code execution."
    fix: "Set enable-jmx-monitoring=false unless you actively use JMX; if you do, bind it to localhost with authentication and TLS."
    title: "JMX monitoring is enabled"
  jvm-heap:
    detail: "The JVM max heap (-Xmx ~{0} MB) is {1}% of the machine's RAM (~{2} MB). That leaves almost nothing for the OS, off-heap memory and other processes, so the server risks being OOM-killed or swapping itself to a crawl."
    fix: "Leave headroom: set -Xmx to roughly 70-80% of RAM (and Xms equal to Xmx), accounting for anything else running on the box."
    title: "JVM heap is nearly all of system RAM"
  log4shell:
    detail: "Detected Minecraft {0}, from the period affected by CVE-2021-44228 (Log4Shell). Whether you're actually exposed depends on your build: Paper/Spigot jars from 2021-12-10 or later embed patched Log4j (2.15+) and are safe."
    fix: "Make sure your server jar is a build from 2021-12-10 or later (or update to 1.18.1+), or launch with -Dlog4j2.formatMsgNoLookups=true."
    title: "Minecraft version from the Log4Shell era"
  many-operators:
    detail: ")"
    fix: "There are "
    title: "Many server operators ("
  no-proxy-protection:
    detail: "prevent-proxy-connections=false (the default) leaves Mojang's own proxy check off, so connections through known proxies aren't rejected. This is just the vanilla flag - a dedicated AntiVPN plugin does a far better job."
    fix: "Set prevent-proxy-connections=true for a light vanilla check, or run an AntiVPN plugin if ban-evasion/bots are a problem."
    title: "VPN/proxy connections not blocked (vanilla toggle)"
  no-rate-limit:
    detail: "rate-limit=0 is the stock default and leaves the per-connection packet limit off, so a flood/crasher client isn't dropped by the server itself. Paper has its own packet protections, so treat this as optional hardening, not an open hole."
    fix: "Optionally set rate-limit to something like 300 so abusive clients get dropped - test that it doesn't affect normal players."
    title: "No packet rate limit (default)"
  no-server-properties:
    detail: "Bulwark couldn't find server.properties next to the server jar, so a few checks were skipped. This is normal on a proxy."
    fix: "Run Bulwark on the game server itself, or check file permissions."
    title: "server.properties not found"
  no-spawn-protection:
    detail: "spawn-protection=0 lets non-ops build and break at spawn. That's perfectly fine if you guard spawn with a region plugin (WorldGuard etc.) - flagged just for awareness."
    fix: "Set a small radius (e.g. 16), or ignore this if a region plugin already protects spawn."
    title: "No vanilla spawn protection"
  no-whitelist:
    detail: "white-list=false means anyone who knows the address can join. Fine for a public server, risky for a private or staging one."
    fix: "Set white-list=true (and enforce-whitelist=true) if this server is meant to be private."
    title: "Whitelist is off"
  offline-mode:
    detail: "online-mode=false with no proxy detected and no login plugin found. Anyone can log in as ANY username - including your admins - with no authentication. This is the biggest account-security hole there is."
    fix: "Set online-mode=true in server.properties and restart. Only use offline mode behind a properly firewalled proxy, or with a login plugin (AuthMe) that enforces passwords."
    title: "Server is in offline mode"
  offline-mode-login:
    detail: "online-mode=false with no proxy, but a login plugin (AuthMe/nLogin/...) is installed to authenticate players. That mitigates the biggest risk - but offline mode is still weaker than real authentication (a leaked password is the only thing protecting an account, and a misconfigured login plugin re-opens the hole)."
    fix: "Use online-mode=true if you don't specifically need cracked/offline players; otherwise make sure the login plugin enforces registration and strong passwords."
    title: "Offline mode (a login plugin is handling auth)"
  offline-mode-proxy:
    detail: "online-mode is false, which is expected when a proxy (BungeeCord/Velocity) handles login."
    fix: "Make sure the server port is firewalled so only the proxy can reach it and that modern forwarding (Velocity) or BungeeGuard is enabled - otherwise anyone can connect directly as any player."
    title: "Offline mode (proxy detected)"
  old-java:
    detail: "java.version"
    fix: "?"
    title: "Outdated Java ("
  process-as-root:
    detail: "The Minecraft server runs as the root user. Any plugin - or a remote-code-execution bug in one - then controls the whole machine, not just the server. That's the worst possible blast radius for a compromise.{0}"
    fix: "Run the server as a dedicated non-root user: create one, chown the server files to it, and start the service as that user."
    title: "Server process is running as root"
  query-enabled:
    detail: "enable-query=true exposes live server info (players, version) to anyone, which attackers use to fingerprint and target servers."
    fix: "Set enable-query=false unless a tool you run truly needs it."
    title: "Query protocol enabled"
  query-plugins:
    detail: "bukkit.yml settings.query-plugins=true makes the (enabled) query protocol hand out your exact plugin list and versions, which attackers use to fingerprint known-vulnerable plugins on your server."
    fix: "Set query-plugins=false in bukkit.yml, or turn the query protocol off entirely with enable-query=false in server.properties."
    title: "Query exposes the full plugin list"
  rcon-enabled:
    detail: "Remote console is on. Even with a strong password, an exposed RCON port is a remote-control risk."
    fix: "Firewall the RCON port so only you can reach it, or disable it when unused."
    title: "RCON is enabled"
  rcon-no-password:
    detail: "Remote console (RCON) is on with an empty password - that's full remote control of your server for anyone who can reach the RCON port."
    fix: "Set a long random rcon.password, or turn RCON off (enable-rcon=false) if you don't use it. Never expose the RCON port to the internet."
    title: "RCON enabled with no password"
  rcon-weak-password:
    detail: "RCON is enabled with a short password ({0} chars), which is brute-forceable."
    fix: "Use a 16+ character random password and firewall the RCON port to localhost/admin only."
    title: "RCON password is weak"
  resource-pack-no-sha:
    detail: "A resource-pack URL is set but resource-pack-sha1 is empty, so clients can't verify the pack - a man-in-the-middle could swap it for an altered one, and clients re-download it every join."
    fix: "Set resource-pack-sha1 to the SHA-1 of the exact pack file you serve."
    title: "Resource pack served without a SHA-1"
  unsupported-exploit:
    detail: "Paper's unsupported-settings.{0} is true, which intentionally re-enables a known exploit or dupe."
    fix: "Set {0} back to false unless you fully understand the consequence."
    title: "Dangerous 'unsupported' setting enabled"
  velocity-no-secret:
    detail: "Velocity modern forwarding is on but the secret is empty, so the backend can't verify the proxy - players can be spoofed."
    fix: "Set the same forwarding secret in the proxy and in the server's Velocity secret."
    title: "Velocity forwarding without a secret"
    detail: "max-tick-time={0} turns off the single-tick watchdog, so a hung or deadlocked tick won't trip the crash/restart safeguard - the server can freeze indefinitely instead of recovering."
    fix: "Leave max-tick-time at the default (60000) unless you have a specific reason, so a frozen server is caught and restarted."
    title: "Server watchdog disabled (max-tick-time)"
    detail: "spigot.yml timeout-time is non-positive, so the watchdog won't restart a frozen server."
    fix: "Leave timeout-time at a sane value (e.g. 60) so a hung server recovers on its own."
    title: "Server watchdog effectively off"
  whitelist-not-enforced:
    detail: "The whitelist is on but enforce-whitelist=false, so a player removed from it while online isn't kicked."
    fix: "Set enforce-whitelist=true so whitelist changes apply immediately."
    title: "Whitelist not enforced live"
